<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Caderneta do Casal</title>
<style>
  :root{
    --bg:#F3F5F7;
    --surface:#FFFFFF;
    --border:#E1E5EA;
    --ink:#161B22;
    --ink-soft:#6B7280;
    --accent:#1F3A5F;
    --accent-soft:#E8EDF3;
    --positive:#1F6F54;
    --negative:#A8392B;
    --cat-1:#1F6F54;
    --cat-2:#2A4D78;
    --cat-3:#A8392B;
    --cat-4:#8A6A1E;
    --shadow: 0 1px 2px rgba(16,24,32,0.04), 0 4px 14px rgba(16,24,32,0.06);
  }
  html[data-theme="dark"]{
    --bg:#0E1217;
    --surface:#161B22;
    --border:#262D37;
    --ink:#EAEDF1;
    --ink-soft:#8B94A3;
    --accent:#5B86B8;
    --accent-soft:#1C2733;
    --positive:#3FA383;
    --negative:#D2685A;
    --cat-1:#3FA383;
    --cat-2:#5B86B8;
    --cat-3:#D2685A;
    --cat-4:#C9A23F;
    --shadow: 0 1px 2px rgba(0,0,0,0.3), 0 4px 14px rgba(0,0,0,0.35);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    min-height:100vh;
    padding-bottom:96px;
    transition:background .15s,color .15s;
  }
  svg.icon{width:18px;height:18px;stroke:currentColor;stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round;display:block;}
  .num{font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace; font-weight:600; font-feature-settings:"tnum";}
  .wrap{max-width:560px;margin:0 auto;padding:18px 16px 0;}

  /* lock screen */
  .lock-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px;}
  .lock-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px 24px;max-width:340px;width:100%;text-align:center;box-shadow:var(--shadow);}
  .lock-icon{width:46px;height:46px;border-radius:12px;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;}
  .lock-card h2{font-size:17px;font-weight:700;margin:0 0 4px;color:var(--ink);}
  .lock-card p{font-size:13px;color:var(--ink-soft);margin:0 0 16px;}
  .lock-card input{width:100%;text-align:center;font-size:24px;letter-spacing:12px;padding:12px;border-radius:10px;border:1px solid var(--border);background:var(--bg);color:var(--ink);font-family:ui-monospace,monospace;margin-bottom:12px;}
  .lock-error{color:var(--negative);font-size:12.5px;margin-top:10px;min-height:16px;font-weight:600;}

  /* header */
  header.top{
    display:flex;align-items:center;justify-content:space-between;
    margin-bottom:6px;
  }
  .brand{display:flex;align-items:center;gap:9px;}
  .brand-mark{
    width:30px;height:30px;border-radius:8px;background:var(--accent);
    display:flex;align-items:center;justify-content:center;color:#fff;flex:0 0 auto;
  }
  h1.brand-text{
    font-size:16.5px; font-weight:700; letter-spacing:-.1px; margin:0; color:var(--ink);
    line-height:1.15;
  }
  h1.brand-text .sub{display:block;font-size:11px;font-weight:500;color:var(--ink-soft);letter-spacing:.2px;}
  .top-actions{display:flex;gap:4px;}
  .icon-btn{
    background:none;border:none;cursor:pointer;color:var(--ink-soft);
    padding:8px;line-height:1;border-radius:9px;display:flex;align-items:center;justify-content:center;
  }
  .icon-btn:hover{background:var(--accent-soft);color:var(--accent);}

  .month-row{
    display:flex;align-items:center;justify-content:space-between;
    background:var(--surface);border:1px solid var(--border);
    border-radius:12px;padding:8px 6px;margin:14px 0 16px;box-shadow:var(--shadow);
  }
  .month-row button{
    background:none;border:none;color:var(--ink-soft);cursor:pointer;
    width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;
  }
  .month-row button:hover{background:var(--accent-soft);color:var(--accent);}
  .month-label{
    font-size:14.5px; font-weight:600; text-transform:capitalize; letter-spacing:-.1px;
  }

  /* summary card */
  .summary{
    background:var(--surface);border:1px solid var(--border);border-radius:14px;
    padding:16px 16px 12px;box-shadow:var(--shadow);margin-bottom:16px;
  }
  .summary-top{display:flex;justify-content:space-between;margin-bottom:14px;}
  .summary-stat .label{font-size:10.5px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.5px;font-weight:600;}
  .summary-stat .value{font-size:17px;font-weight:700;display:flex;align-items:center;gap:5px;}
  .summary-stat.saldo .value{color:var(--positive);}
  .summary-stat.saldo.negativo .value{color:var(--negative);}

  .mood-line{
    display:flex;align-items:center;justify-content:center;gap:8px;background:var(--bg);border:1px solid var(--border);
    border-radius:10px;padding:9px 12px;margin-bottom:14px;font-size:12.5px;color:var(--ink-soft);font-weight:600;
    text-align:center;
  }
  .mood-line .big-emoji{font-size:22px;}

  .bars{display:flex;flex-direction:column;gap:6px;margin-bottom:4px;}
  .bar-row{display:flex;align-items:center;gap:10px;cursor:pointer;border-radius:8px;padding:4px;margin:0 -4px;transition:background .12s;}
  .bar-row:hover{background:var(--accent-soft);}
  .bar-row.active{background:var(--accent-soft);box-shadow:inset 0 0 0 1px var(--accent);}
  .bar-icon{
    width:22px;height:22px;border-radius:6px;flex:0 0 auto;color:#fff;
    display:flex;align-items:center;justify-content:center;
  }
  .bar-icon svg{width:13px;height:13px;}
  .bar-track{
    flex:1;height:7px;background:var(--bg);border-radius:4px;overflow:hidden;
    border:1px solid var(--border);
  }
  .bar-fill{height:100%;border-radius:4px;}
  .bar-text{font-size:10.5px;color:var(--ink-soft);min-width:96px;text-align:right;white-space:nowrap;}
  .bar-name{font-size:12px;min-width:84px;font-weight:600;}

  /* filter chip + search */
  .filter-chip-wrap{margin-bottom:10px;display:none;}
  .filter-chip{
    display:inline-flex;align-items:center;gap:7px;background:var(--accent);color:#fff;
    padding:7px 11px;border-radius:999px;font-size:12px;font-weight:600;cursor:pointer;
  }
  .search-box{position:relative;margin-bottom:14px;}
  .search-box svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--ink-soft);width:16px;height:16px;}
  .search-box input{
    width:100%;padding:11px 12px 11px 36px;border-radius:10px;border:1px solid var(--border);
    background:var(--surface);font-size:14px;color:var(--ink);font-family:inherit;
  }

  /* list */
  .day-label{
    font-size:10.5px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.6px;
    margin:18px 2px 8px;font-weight:700;
  }
  .item{
    background:var(--surface);border:1px solid var(--border);
    border-radius:12px;padding:11px 12px;margin-bottom:8px;
    display:flex;align-items:flex-start;gap:11px;box-shadow:var(--shadow);cursor:pointer;
  }
  .item:hover{border-color:var(--accent);}
  .cat-chip{
    width:34px;height:34px;border-radius:9px;flex:0 0 auto;
    display:flex;align-items:center;justify-content:center;color:#fff;margin-top:1px;
  }
  .cat-chip svg{width:16px;height:16px;}
  .item-info{flex:1;min-width:0;}
  .item-desc{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .item-meta{font-size:11.5px;color:var(--ink-soft);margin-top:1px;}
  .item-obs{font-size:11.5px;color:var(--ink-soft);margin-top:2px;font-style:italic;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .item-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex:0 0 auto;}
  .item-val{font-size:14.5px;white-space:nowrap;font-weight:700;}
  .item-actions{display:flex;gap:2px;}
  .del-btn{
    background:none;border:none;color:var(--ink-soft);cursor:pointer;
    padding:4px;flex:0 0 auto;border-radius:7px;
    display:flex;align-items:center;gap:4px;font-size:11px;font-weight:600;
  }
  .del-btn:hover{color:var(--negative);}
  .del-btn.armed{color:var(--negative);}
  .cancel-btn:hover{color:var(--accent);}
  .cancel-btn.armed{color:var(--accent);}
  .dup-btn:hover{color:var(--accent);}

  .empty{
    text-align:center;color:var(--ink-soft);padding:40px 10px;font-size:13.5px;
  }

  /* fab */
  .fab{
    position:fixed;bottom:24px;right:50%;transform:translateX(50%) translateX(244px);
    width:54px;height:54px;border-radius:50%;background:var(--accent);color:#fff;
    border:none;box-shadow:0 6px 18px rgba(31,58,95,0.35);cursor:pointer;
    display:flex;align-items:center;justify-content:center;
  }
  .fab svg{width:24px;height:24px;}
  @media (max-width:560px){
    .fab{right:20px;transform:none;}
  }

  /* overlay/modal */
  .overlay{
    position:fixed;inset:0;background:rgba(10,14,20,0.5);
    display:flex;align-items:flex-end;justify-content:center;z-index:50;
  }
  .overlay.hidden{display:none;}
  .sheet{
    background:var(--bg);width:100%;max-width:560px;border-radius:18px 18px 0 0;
    padding:18px 18px 24px;max-height:88vh;overflow-y:auto;
    box-shadow:0 -8px 30px rgba(0,0,0,0.25);
    border-top:1px solid var(--border);
  }
  .sheet h2{
    font-size:16.5px;font-weight:700;margin:2px 0 16px;letter-spacing:-.1px;
  }
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:11px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px;font-weight:600;}
  .field input[type=text], .field input[type=date], .field input[type=number], .field select{
    width:100%;padding:11px 12px;border-radius:9px;border:1px solid var(--border);
    background:var(--surface);font-size:14.5px;color:var(--ink);
    font-family:inherit;appearance:none;-webkit-appearance:none;
  }
  .field select{
    background-image:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="%236B7280" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>');
    background-repeat:no-repeat;background-position:right 10px center;background-size:16px;padding-right:34px;
  }
  .valor-input{
    width:100%;padding:12px 12px;border-radius:9px;border:1px solid var(--border);
    background:var(--surface);font-size:25px;font-family: ui-monospace, Menlo, Consolas, monospace;
    color:var(--ink);font-weight:700;
  }
  .pill-row{display:flex;gap:8px;flex-wrap:wrap;}
  .pill{
    padding:8px 13px;border-radius:9px;border:1px solid var(--border);
    background:var(--surface);font-size:13px;font-weight:600;cursor:pointer;color:var(--ink-soft);
    display:inline-flex;align-items:center;gap:6px;
  }
  .pill svg{width:14px;height:14px;}
  .pill.active{color:#fff;border-color:transparent;}
  .toggle-row{display:flex;gap:8px;}
  .toggle-row .pill{flex:1;justify-content:center;}
  .save-btn{
    width:100%;padding:13px;border-radius:10px;border:none;background:var(--accent);
    color:#fff;font-size:15px;font-weight:700;cursor:pointer;margin-top:6px;
  }
  .save-btn:disabled{opacity:.5;}
  .cancel-link{
    display:block;text-align:center;margin-top:12px;color:var(--ink-soft);
    font-size:13px;font-weight:600;background:none;border:none;cursor:pointer;width:100%;
  }
  .sheet-handle{
    width:36px;height:4px;background:var(--border);border-radius:3px;margin:0 auto 14px;
  }

  .two-col{display:flex;gap:10px;}
  .two-col .field{flex:1;}
  .hint{font-size:11.5px;color:var(--ink-soft);margin-top:5px;}
  .static-tag{
    display:inline-flex;align-items:center;padding:9px 13px;border-radius:9px;
    background:var(--accent-soft);color:var(--accent);font-size:13px;font-weight:600;
  }

  .toast{
    position:fixed;bottom:96px;left:50%;transform:translateX(-50%);
    background:var(--ink);color:var(--bg);padding:10px 18px;border-radius:9px;
    font-size:13px;font-weight:600;opacity:0;transition:opacity .25s;pointer-events:none;z-index:80;
    max-width:90%;text-align:center;
  }
  .toast.show{opacity:1;}

  .status-line{text-align:center;color:var(--ink-soft);font-size:12px;padding:14px 0;}
</style>
</head>
<body>

<!-- LOCK SCREEN -->
<div class="lock-screen" id="lockScreen">
  <div class="lock-card">
    <div class="lock-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:22px;height:22px"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>
    </div>
    <h2>Caderneta do Casal</h2>
    <p>Digite a senha de acesso</p>
    <input type="password" id="lockInput" inputmode="numeric" maxlength="4" placeholder="••••" autofocus>
    <button class="save-btn" onclick="tryUnlock()">Entrar</button>
    <div class="lock-error" id="lockError"></div>
  </div>
</div>

<!-- APP CONTENT (escondido até desbloquear) -->
<div id="appContent" style="display:none;">

<div class="wrap">
  <header class="top">
    <div class="brand">
      <div class="brand-mark">
        <svg class="icon" viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 10h18"/><path d="M7 15h4"/></svg>
      </div>
      <h1 class="brand-text">Caderneta<span class="sub">Controle financeiro do casal</span></h1>
    </div>
    <div class="top-actions">
      <button class="icon-btn" id="themeBtn" onclick="toggleTheme()" aria-label="Alternar tema"></button>
      <button class="icon-btn" onclick="openSettings()" aria-label="Configurações">
        <svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.6 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.6a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
    </div>
  </header>

  <div class="month-row">
    <button onclick="changeMonth(-1)" aria-label="Mês anterior">
      <svg class="icon" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <div class="month-label" id="monthLabel">—</div>
    <button onclick="changeMonth(1)" aria-label="Próximo mês">
      <svg class="icon" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>
    </button>
  </div>

  <div class="summary">
    <div class="summary-top">
      <div class="summary-stat">
        <div class="label">Renda</div>
        <div class="value num" id="stRenda">R$ 0</div>
      </div>
      <div class="summary-stat">
        <div class="label">Gastos</div>
        <div class="value num" id="stGasto">R$ 0</div>
      </div>
      <div class="summary-stat saldo">
        <div class="label">Saldo</div>
        <div class="value num" id="stSaldo">R$ 0</div>
      </div>
    </div>
    <div class="mood-line" id="moodLine"></div>
    <div class="bars" id="bars"></div>
  </div>

  <div class="filter-chip-wrap" id="filterChipWrap"></div>
  <div class="search-box">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
    <input type="text" id="searchInput" placeholder="Pesquisar por descrição, observação..." oninput="onSearchInput()">
  </div>

  <div id="list"></div>
  <div id="statusLine" class="status-line"></div>
</div>

<button class="fab" onclick="openAdd()" aria-label="Novo gasto">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
</button>

<!-- ADD / EDIT SHEET -->
<div class="overlay hidden" id="addOverlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h2 id="addSheetTitle">Novo gasto</h2>

    <div class="field">
      <label>Valor <span id="valorHintParcela" style="text-transform:none;font-weight:500;"></span></label>
      <input class="valor-input" id="fValor" type="text" inputmode="decimal" placeholder="0,00" autofocus>
    </div>

    <div class="field">
      <label>Descrição</label>
      <select id="fDesc">
        <option value="" disabled selected>Selecione...</option>
      </select>
    </div>

    <div class="field">
      <label>Observação <span style="text-transform:none;font-weight:500;">(opcional)</span></label>
      <input type="text" id="fObs" placeholder="Ex: Comida dos gatos, Teclado musical...">
    </div>

    <div class="field">
      <label>Categoria</label>
      <div class="pill-row" id="catPills"></div>
    </div>

    <div class="field">
      <label>Quem gastou</label>
      <div class="pill-row" id="pessoaPills"></div>
    </div>

    <div class="two-col" id="tipoDateRow">
      <div class="field">
        <label>Tipo</label>
        <div class="toggle-row" id="tipoPills"></div>
      </div>
      <div class="field">
        <label>Data</label>
        <input type="date" id="fData">
      </div>
    </div>
    <div class="hint" id="tipoHint" style="margin:-6px 0 14px;"></div>

    <div id="parceladoWrap">
      <div class="field">
        <label>Compra parcelada?</label>
        <div class="toggle-row" id="parceladoPills"></div>
      </div>

      <div class="field" id="parcelasField" style="display:none;">
        <label>Número de parcelas</label>
        <input type="number" id="fParcelas" min="2" max="48" value="2">
        <div class="hint">O valor acima é lançado em cada uma das parcelas, nos meses seguintes.</div>
      </div>
    </div>

    <button class="save-btn" id="saveBtn" onclick="saveGasto()">Salvar gasto</button>
    <button class="cancel-link" onclick="closeAdd()">Cancelar</button>
  </div>
</div>

<!-- SETTINGS SHEET -->
<div class="overlay hidden" id="settingsOverlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h2>Configurações da renda</h2>

    <div class="field">
      <label id="lbl1">Nome da pessoa 1</label>
      <input type="text" id="fNome1">
    </div>
    <div class="field">
      <label>Renda mensal (pessoa 1)</label>
      <input type="text" id="fRenda1" inputmode="decimal">
    </div>
    <div class="field">
      <label id="lbl2">Nome da pessoa 2</label>
      <input type="text" id="fNome2">
    </div>
    <div class="field">
      <label>Renda mensal (pessoa 2)</label>
      <input type="text" id="fRenda2" inputmode="decimal">
    </div>

    <button class="save-btn" onclick="savePerfil()">Salvar</button>
    <button class="cancel-link" onclick="closeSettings()">Fechar</button>
  </div>
</div>

<div class="toast" id="toast"></div>

</div><!-- /appContent -->

<script>
/* ============================================================
   SENHA DE ACESSO (proteção simples no lado do cliente)
   Atenção: como este é um arquivo HTML estático, qualquer pessoa
   que veja o código-fonte da página pode encontrar essa senha.
   Isso funciona como uma trava de uso casual, não como segurança real.
   ============================================================ */
const APP_PASSWORD = "5928";
function tryUnlock(){
  const val = document.getElementById("lockInput").value;
  if(val === APP_PASSWORD){
    document.getElementById("lockScreen").style.display = "none";
    document.getElementById("appContent").style.display = "block";
    initApp();
  } else {
    document.getElementById("lockError").textContent = "Senha incorreta. Tente novamente.";
    document.getElementById("lockInput").value = "";
    document.getElementById("lockInput").focus();
  }
}
document.getElementById("lockInput").addEventListener("keydown", function(e){
  if(e.key === "Enter") tryUnlock();
});

/* ============================================================
   CONEXÃO COM SUPABASE
   Usamos só a chave pública (anon) — ela é segura para ficar
   no código do navegador. NUNCA coloque a service_role/secret
   key aqui.

function startOfMonth(d){ return new Date(d.getFullYear(), d.getMonth(), 1); }
function fmtMoney(n){
  return "R$ " + Math.round(n||0).toLocaleString("pt-BR");
}
function isoDate(d){
  const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,"0"), day=String(d.getDate()).padStart(2,"0");
  return `${y}-${m}-${day}`;
}
function addMonths(dateStr, n){
  const [y,m,d] = dateStr.split("-").map(Number);
  const base = new Date(y, (m-1)+n, 1);
  const lastDay = new Date(base.getFullYear(), base.getMonth()+1, 0).getDate();
  const day = Math.min(d, lastDay);
  return isoDate(new Date(base.getFullYear(), base.getMonth(), day));
}
function monthRange(d){
  const start = new Date(d.getFullYear(), d.getMonth(), 1);
  const end = new Date(d.getFullYear(), d.getMonth()+1, 0);
  return { start: isoDate(start), end: isoDate(end) };
}
function mesIndex(dateStr){
  const [y,m] = dateStr.split("-").map(Number);
  return y*12 + (m-1);
}
function toast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"), 2200);
}

function virtuaisDoMes(monthDate){
  const y = monthDate.getFullYear(), m = monthDate.getMonth();
  const mesAtual = y*12 + m;
  const lastDay = new Date(y, m+1, 0).getDate();
  return state.fixos
    .filter(f=>{
      const mesInicio = mesIndex(f.data_inicio);
      const mesFim = f.data_fim ? mesIndex(f.data_fim) : Infinity;
      return mesAtual >= mesInicio && mesAtual < mesFim;
    })
    .map(f=>{
      const day = Math.min(f.dia, lastDay);
      const data = isoDate(new Date(y, m, day));
      return {
        id: `fixo-${f.id}-${data}`,
        __virtual: true,
        fixoId: f.id,
        descricao: f.descricao,
        observacao: f.observacao,
        categoria: f.categoria,
        pessoa: f.pessoa,
        valor: Number(f.valor),
        tipo: "Fixo",
        data,
        parcela_grupo_id: null, parcela_atual: null, parcela_total: null
      };
    });
}

async function loadGastos(){
  state.loading = true;
  renderStatus("Carregando...");
  const { start, end } = monthRange(state.monthDate);
  const res = await sb(`gastos?data=gte.${start}&data=lte.${end}&select=*&order=data.desc,created_at.desc`);
  let avulsos = [];
  if(res.ok){
    avulsos = await res.json();
  } else {
    renderStatus("Não foi possível carregar. Veja se a tabela 'gastos' já existe (e tem as colunas novas) no Supabase.");
  }
  const fixosDoMes = virtuaisDoMes(state.monthDate);
  state.gastos = [...avulsos, ...fixosDoMes].sort((a,b)=> b.data.localeCompare(a.data));
  state.loading = false;
  renderAll();
}

function getMood(saldo, renda){
  const pct = renda > 0 ? (saldo/renda) : (saldo > 0 ? 1 : (saldo < 0 ? -1 : 0));
  if(saldo < 0) return { emoji:"😟", label:"Mês no vermelho" };
  if(pct < 0.05) return { emoji:"😐", label:"Mês neutro — sobrou pouco" };
  return { emoji:"😄", label:"Mês positivo" };
}

function renderSummary(){
  const renda = Number(state.perfil.renda_pessoa1||0) + Number(state.perfil.renda_pessoa2||0);
  const totalGasto = state.gastos.reduce((s,g)=>s+Number(g.valor),0);
  const saldo = renda - totalGasto;

  document.getElementById("stRenda").textContent = fmtMoney(renda);
  document.getElementById("stGasto").textContent = fmtMoney(totalGasto);
  const saldoEl = document.getElementById("stSaldo");
  const mood = getMood(saldo, renda);
  saldoEl.textContent = fmtMoney(saldo);
  saldoEl.parentElement.classList.toggle("negativo", saldo < 0);

  const moodLine = document.getElementById("moodLine");
  moodLine.innerHTML = `<span class="big-emoji">${mood.emoji}</span><span>${mood.label}</span>`;

  const barsEl = document.getElementById("bars");
  barsEl.innerHTML = "";
  CATS.forEach(cat=>{
    const gastoCat = state.gastos.filter(g=>g.categoria===cat.nome).reduce((s,g)=>s+Number(g.valor),0);
    const idealValor = renda * cat.ideal;
    const pct = idealValor > 0 ? Math.min(100, (gastoCat/idealValor)*100) : (gastoCat>0?100:0);
    const row = document.createElement("div");
    row.className = "bar-row" + (state.categoriaFiltro === cat.nome ? " active" : "");
    row.innerHTML = `
      <div class="bar-icon" style="background:${cat.cor}">${cat.icon}</div>
      <div class="bar-name">${cat.nome}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${cat.cor}"></div></div>
      <div class="bar-text">${fmtMoney(gastoCat)} <span style="opacity:.6">/ ${fmtMoney(idealValor)}</span></div>
    `;
    row.onclick = ()=>{
      state.categoriaFiltro = (state.categoriaFiltro === cat.nome) ? null : cat.nome;
      renderSummary();
      renderFilterChip();
      renderList();
    };
    barsEl.appendChild(row);
  });
}

function renderFilterChip(){

}

function onSearchInput(){

  renderList();
}

function getFilteredGastos(){
  const term = (state.searchTerm||"").trim().toLowerCase();
  return state.gastos.filter(g=>{
    if(state.categoriaFiltro && g.categoria !== state.categoriaFiltro) return false;
    if(term){
      const hay = `${g.descricao} ${g.observacao||""} ${g.pessoa} ${g.categoria}`.toLowerCase();
      if(!hay.includes(term)) return false;
    }
    return true;
  });
}

function renderList(){
  const listEl = document.getElementById("list");
  listEl.innerHTML = "";
  const filtrados = getFilteredGastos();

  if(filtrados.length === 0){
    const msg = (state.categoriaFiltro || state.searchTerm)
      ? "Nenhum gasto encontrado com esse filtro/pesquisa."
      : "Nenhum gasto lançado neste mês ainda.<br>Toque no botão + para adicionar o primeiro.";
    listEl.innerHTML = `<div class="empty">${msg}</div>`;
    return;
  }

  let lastDate = null;
  filtrados.forEach(g=>{
    if(g.data !== lastDate){
      lastDate = g.data;
      const lbl = document.createElement("div");
      lbl.className = "day-label";
      const d = new Date(g.data + "T00:00:00");
      lbl.textContent = d.toLocaleDateString("pt-BR", { weekday:"short", day:"2-digit", month:"short" });
      listEl.appendChild(lbl);
    }
    const cat = catByName(g.categoria) || CATS[2];
    const item = document.createElement("div");
    item.className = "item";

    let metaTxt = `${g.pessoa} · ${g.tipo}`;
    if(g.parcela_total){ metaTxt += ` · Parcela ${g.parcela_atual}/${g.parcela_total}`; }
    if(g.__virtual){ metaTxt += ` · Recorrente`; }

    const showCancelParcela = g.parcela_grupo_id && g.parcela_atual < g.parcela_total;

    item.innerHTML = `
      <div class="cat-chip" style="background:${cat.cor}">${cat.icon}</div>
      <div class="item-info">
        <div class="item-desc">${escapeHtml(g.descricao)}</div>
        <div class="item-meta">${metaTxt}</div>
        ${g.observacao ? `<div class="item-obs">Obs: ${escapeHtml(g.observacao)}</div>` : ``}
      </div>
      <div class="item-right">
        <div class="item-val num">${fmtMoney(g.valor)}</div>
        <div class="item-actions"></div>
      </div>
    `;

    const actionsEl = item.querySelector(".item-actions");

    const dupBtn = document.createElement("button");
    dupBtn.className = "del-btn dup-btn";
    dupBtn.title = "Lançar no próximo mês";
    dupBtn.innerHTML = ICONS.forward;
    dupBtn.addEventListener("click", (e)=>{ e.stopPropagation(); duplicateToNextMonth(g); });
    actionsEl.appendChild(dupBtn);

    if(g.__virtual){
      const endBtn = document.createElement("button");
      endBtn.className = "del-btn";
      endBtn.title = "Remover a partir deste mês";
      endBtn.innerHTML = ICONS.trash;
      endBtn.addEventListener("click", (e)=>{ e.stopPropagation(); handleEndFixo(endBtn, g.fixoId); });
      actionsEl.appendChild(endBtn);
    } else {
      if(showCancelParcela){
        const cancelBtn = document.createElement("button");
        cancelBtn.className = "del-btn cancel-btn";
        cancelBtn.title = "Cancelar parcelas futuras";
        cancelBtn.innerHTML = ICONS.ban;
        cancelBtn.addEventListener("click", (e)=>{ e.stopPropagation(); handleCancelFuture(cancelBtn, g.parcela_grupo_id, g.data); });
        actionsEl.appendChild(cancelBtn);
      }
      const delBtn = document.createElement("button");
      delBtn.className = "del-btn";
      delBtn.title = "Excluir";
      delBtn.innerHTML = ICONS.trash;
      delBtn.addEventListener("click", (e)=>{ e.stopPropagation(); handleDelete(delBtn, g.id); });
      actionsEl.appendChild(delBtn);
    }

    item.addEventListener("click", ()=> openEditItem(g));
    listEl.appendChild(item);
  });
}

function escapeHtml(s){
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

/* ---------- duplicar para o próximo mês ---------- */
async function duplicateToNextMonth(g){
  const novaData = addMonths(g.data, 1);
  const row = {
    descricao: g.descricao, valor: g.valor, categoria: g.categoria, tipo: g.tipo,
    pessoa: g.pessoa, data: novaData, observacao: g.observacao || null
  };
  const res = await sb("gastos", { method:"POST", body: JSON.stringify([row]) });
  if(res.ok){
    toast("Lançado no mês seguinte");
    const [ny, nm] = novaData.split("-").map(Number);
    if(state.monthDate.getFullYear()===ny && (state.monthDate.getMonth()+1)===nm){ loadGastos(); }
  } else {
    toast("Não foi possível lançar no próximo mês");
  }
}

/* ---------- excluir gasto avulso/parcela ---------- */
let deleteArmedId = null;
function handleDelete(btn, id){
  if(deleteArmedId !== id){
    document.querySelectorAll(".del-btn.armed").forEach(b=>{ b.classList.remove("armed"); if(!b.classList.contains("cancel-btn")) b.innerHTML = ICONS.trash; });
    btn.classList.add("armed");
    btn.innerHTML = ICONS.trash + "<span>Confirmar</span>";
    deleteArmedId = id;
    setTimeout(()=>{
      if(deleteArmedId === id){
        btn.classList.remove("armed");
        btn.innerHTML = ICONS.trash;
        deleteArmedId = null;
      }
    }, 3000);
    return;
  }
  deleteArmedId = null;
  deleteGasto(id);
}

async function deleteGasto(id){
  const res = await sb(`gastos?id=eq.${id}`, { method:"DELETE" });
  if(res.ok){
    state.gastos = state.gastos.filter(g=>g.id!==id);
    renderAll();
    toast("Gasto removido");
  } else {
    toast("Não foi possível remover");
  }
}

/* ---------- cancelar parcelas futuras ---------- */
let cancelArmedKey = null;
function handleCancelFuture(btn, grupo, data){
  const key = "parcela-"+grupo+data;
  if(cancelArmedKey !== key){
    document.querySelectorAll(".del-btn.armed").forEach(b=>{ b.classList.remove("armed"); b.innerHTML = b.classList.contains("cancel-btn") ? ICONS.ban : ICONS.trash; });
    btn.classList.add("armed");
    btn.innerHTML = ICONS.ban + "<span>Confirmar</span>";
    cancelArmedKey = key;
    setTimeout(()=>{
      if(cancelArmedKey === key){
        btn.classList.remove("armed");
        btn.innerHTML = ICONS.ban;
        cancelArmedKey = null;
      }
    }, 3000);
    return;
  }
  cancelArmedKey = null;
  cancelFutureInstallments(grupo, data);
}

async function cancelFutureInstallments(grupoId, dataAtual){
  const res = await sb(`gastos?parcela_grupo_id=eq.${grupoId}&data=gt.${dataAtual}`, { method:"DELETE" });
  if(res.ok){
    toast("Parcelas futuras canceladas");
    loadGastos();
  } else {
    toast("Não foi possível cancelar as parcelas futuras");
  }
}

/* ---------- remover fixo a partir do mês exibido ---------- */
let endFixoArmedId = null;
function handleEndFixo(btn, fixoId){
  if(endFixoArmedId !== fixoId){
    document.querySelectorAll(".del-btn.armed").forEach(b=>{ b.classList.remove("armed"); if(!b.classList.contains("cancel-btn")) b.innerHTML = ICONS.trash; });
    btn.classList.add("armed");
    btn.innerHTML = ICONS.trash + "<span>Confirmar</span>";
    endFixoArmedId = fixoId;
    setTimeout(()=>{
      if(endFixoArmedId === fixoId){
        btn.classList.remove("armed");
        btn.innerHTML = ICONS.trash;
        endFixoArmedId = null;
      }
    }, 3000);
    return;
  }
  endFixoArmedId = null;
  endFixoFromMonth(fixoId);
}

async function endFixoFromMonth(fixoId){
  const { start } = monthRange(state.monthDate);
  const res = await sb(`fixos?id=eq.${fixoId}`, { method:"PATCH", body: JSON.stringify({ data_fim: start }) });
  if(res.ok){
    toast("Fixo removido a partir deste mês — meses anteriores continuam no histórico");
    await loadFixos();
    loadGastos();
  } else {
    toast("Não foi possível remover o fixo");
  }
}

function changeMonth(delta){
  const d = state.monthDate;
  state.monthDate = new Date(d.getFullYear(), d.getMonth()+delta, 1);
  loadGastos();
}

function openEditItem(g){
  state.editing = { type: g.__virtual ? "fixo" : "gasto", id: g.__virtual ? g.fixoId : g.id };
  document.getElementById("fValor").value = String(g.valor).replace(".", ",");
  document.getElementById("fObs").value = g.observacao || "";
  document.getElementById("fData").value = g.data;
  state.catSel = g.categoria;
  state.pessoaSel = g.pessoa;
  state.tipoSel = g.tipo;
  state.parceladoSel = false;

  buildDescOptions(g.descricao);
  buildCatPills();
  buildPessoaPills();
  buildTipoPills();
  buildParceladoPills();
  document.getElementById("parcelasField").style.display = "none";
  document.getElementById("valorHintParcela").textContent = "";
  document.getElementById("parceladoWrap").style.display = "none";

  if(g.__virtual){
    document.getElementById("tipoDateRow").style.display = "none";
    document.getElementById("tipoHint").textContent = "Esse é um gasto fixo recorrente — a alteração vale para todos os meses em que ele aparece (passados e futuros). Para remover só a partir de um mês específico, use o ícone de lixeira no card.";
  } else {
    document.getElementById("tipoDateRow").style.display = "flex";
    document.getElementById("tipoHint").textContent = "";
  }

  document.getElementById("addSheetTitle").textContent = "Editar gasto";
  document.getElementById("saveBtn").textContent = "Salvar alterações";
  document.getElementById("addOverlay").classList.remove("hidden");
}

function buildDescOptions(selectedValue){
  const el = document.getElementById("fDesc");
  let opts = DESC_OPTIONS.slice();
  if(selectedValue && !opts.includes(selectedValue)) opts.push(selectedValue);
  el.innerHTML = `<option value="" disabled ${selectedValue ? "" : "selected"}>Selecione...</option>` +
    opts.map(o=>`<option value="${o}" ${o===selectedValue ? "selected" : ""}>${o}</option>`).join("");
}

function buildCatPills(){
  const el = document.getElementById("catPills");
  el.innerHTML = "";
  CATS.forEach(cat=>{
    const p = document.createElement("div");
    p.className = "pill" + (state.catSel===cat.nome ? " active":"");
    p.style.background = state.catSel===cat.nome ? cat.cor : "";
    p.innerHTML = cat.icon + `<span>${cat.nome}</span>`;
    p.onclick = ()=>{ state.catSel = cat.nome; buildCatPills(); };
    el.appendChild(p);
  });
}
function buildPessoaPills(){
  const el = document.getElementById("pessoaPills");
  el.innerHTML = "";
  [state.perfil.nome_pessoa1, state.perfil.nome_pessoa2, "Ambos"].forEach(nome=>{
    const p = document.createElement("div");
    p.className = "pill" + (state.pessoaSel===nome ? " active":"");
    p.style.background = state.pessoaSel===nome ? "var(--accent)" : "";
    p.textContent = nome;
    p.onclick = ()=>{ state.pessoaSel = nome; buildPessoaPills(); };
    el.appendChild(p);
  });
}
function buildTipoPills(){
  const el = document.getElementById("tipoPills");
  el.innerHTML = "";
  ["Variável","Fixo"].forEach(t=>{
    const p = document.createElement("div");
    p.className = "pill" + (state.tipoSel===t ? " active":"");
    p.style.background = state.tipoSel===t ? "var(--cat-2)" : "";
    p.textContent = t;
    p.onclick = ()=>{
      if(state.editing) return; // tipo não muda durante edição
      state.tipoSel = t; buildTipoPills(); updateTipoHint();
    };
    el.appendChild(p);
  });
}
function buildParceladoPills(){
  const el = document.getElementById("parceladoPills");
  el.innerHTML = "";
  [{v:false,l:"Não"},{v:true,l:"Sim"}].forEach(opt=>{
    const p = document.createElement("div");
    p.className = "pill" + (state.parceladoSel===opt.v ? " active":"");
    p.style.background = state.parceladoSel===opt.v ? "var(--accent)" : "";
    p.textContent = opt.l;
    p.onclick = ()=>{
      state.parceladoSel = opt.v;
      buildParceladoPills();
      document.getElementById("parcelasField").style.display = opt.v ? "block" : "none";
      document.getElementById("valorHintParcela").textContent = opt.v ? "(valor de cada parcela)" : "";
      updateTipoHint();
    };
    el.appendChild(p);
  });
}
function updateTipoHint(){
  if(state.editing) return;
  const el = document.getElementById("tipoHint");
  el.textContent = (state.tipoSel === "Fixo" && !state.parceladoSel)
    ? "Esse gasto se repete todo mês a partir desta data, até você removê-lo."
    : "";
}

async function saveGasto(){
  const rawValor = document.getElementById("fValor").value.replace(/\./g,"").replace(",",".");
  const valor = parseFloat(rawValor);
  const descricao = document.getElementById("fDesc").value;
  const observacao = document.getElementById("fObs").value.trim() || null;
  const data = document.getElementById("fData").value;

  if(!valor || valor<=0){ toast("Informe um valor válido"); return; }
  if(!descricao){ toast("Selecione uma descrição"); return; }
  if(!state.pessoaSel){ toast("Selecione quem gastou"); return; }

  const btn = document.getElementById("saveBtn");
  btn.disabled = true; btn.textContent = "Salvando...";

  /* ---- modo edição ---- */
  if(state.editing){
    let res;
    if(state.editing.type === "fixo"){
      res = await sb(`fixos?id=eq.${state.editing.id}`, {
        method: "PATCH",
        body: JSON.stringify({ descricao, observacao, categoria: state.catSel, pessoa: state.pessoaSel, valor })
      });
    } else {
      res = await sb(`gastos?id=eq.${state.editing.id}`, {
        method: "PATCH",
        body: JSON.stringify({ descricao, observacao, categoria: state.catSel, tipo: state.tipoSel, pessoa: state.pessoaSel, valor, data })
      });
    }
    btn.disabled = false; btn.textContent = "Salvar alterações";
    if(res.ok){
      closeAdd();
      toast("Gasto atualizado");
      if(state.editing.type === "fixo"){ await loadFixos(); }
      loadGastos();
    } else {
      toast("Não foi possível salvar as alterações");
    }
    return;
  }

  /* ---- modo criação: gasto fixo (não parcelado) -> tabela "fixos" ---- */
  if(state.tipoSel === "Fixo" && !state.parceladoSel){
    const dia = parseInt(data.split("-")[2], 10);
    const res = await sb("fixos", {
      method: "POST",
      body: JSON.stringify([{
        descricao, observacao, categoria: state.catSel, pessoa: state.pessoaSel,
        valor, dia, data_inicio: data
      }])
    });
    btn.disabled = false; btn.textContent = "Salvar gasto";
    if(res.ok){
      closeAdd();
      toast("Gasto fixo criado — vai se repetir todo mês a partir de agora");
      await loadFixos();
      loadGastos();
    } else {
      toast("Erro ao salvar. Veja se a tabela 'fixos' existe no Supabase.");
    }
    return;
  }

  /* ---- modo criação: avulso ou parcelado -> tabela "gastos" ---- */
  let rows;
  if(state.parceladoSel){
    const numParcelas = Math.max(2, parseInt(document.getElementById("fParcelas").value) || 2);
    const grupoId = (crypto.randomUUID ? crypto.randomUUID() : (Date.now()+"-"+Math.random()));
    rows = Array.from({length:numParcelas}, (_,i)=>({
      descricao, valor, categoria: state.catSel, tipo: state.tipoSel,
      pessoa: state.pessoaSel, data: addMonths(data, i), observacao,
      parcela_grupo_id: grupoId, parcela_atual: i+1, parcela_total: numParcelas
    }));
  } else {
    rows = [{
      descricao, valor, categoria: state.catSel, tipo: state.tipoSel,
      pessoa: state.pessoaSel, data, observacao
    }];
  }

  const res = await sb("gastos", { method: "POST", body: JSON.stringify(rows) });

  btn.disabled = false; btn.textContent = "Salvar gasto";

  if(res.ok){
    closeAdd();
    toast(rows.length > 1 ? `Gasto adicionado em ${rows.length} parcelas` : "Gasto adicionado");
    const { start, end } = monthRange(state.monthDate);
    if(data >= start && data <= end){ loadGastos(); }
  } else {
    toast("Erro ao salvar. Veja se a tabela 'gastos' tem as colunas novas no Supabase.");
  }
}

/* ---------- modal: configurações ---------- */
function openSettings(){
  document.getElementById("fNome1").value = state.perfil.nome_pessoa1;
  document.getElementById("fNome2").value = state.perfil.nome_pessoa2;
  document.getElementById("fRenda1").value = String(state.perfil.renda_pessoa1).replace(".",",");
  document.getElementById("fRenda2").value = String(state.perfil.renda_pessoa2).replace(".",",");
  document.getElementById("settingsOverlay").classList.remove("hidden");
}
function closeSettings(){
  document.getElementById("settingsOverlay").classList.add("hidden");
}
async function savePerfil(){
  const nome_pessoa1 = document.getElementById("fNome1").value.trim() || "Pessoa 1";
  const nome_pessoa2 = document.getElementById("fNome2").value.trim() || "Pessoa 2";
  const renda_pessoa1 = parseFloat(document.getElementById("fRenda1").value.replace(/\./g,"").replace(",",".")) || 0;
  const renda_pessoa2 = parseFloat(document.getElementById("fRenda2").value.replace(/\./g,"").replace(",",".")) || 0;

  const res = await sb("perfil?id=eq.1", {
    method: "PATCH",
    body: JSON.stringify({ nome_pessoa1, nome_pessoa2, renda_pessoa1, renda_pessoa2 })
  });
  if(res.ok){
    state.perfil = { ...state.perfil, nome_pessoa1, nome_pessoa2, renda_pessoa1, renda_pessoa2 };
    closeSettings();
    renderAll();
    toast("Configurações salvas");
  } else {
    toast("Erro ao salvar. Veja se a tabela 'perfil' já existe no Supabase.");
  }
}

/* ---------- inicialização (só roda depois da senha) ---------- */
async function initApp(){
  renderMonthLabel();
  await loadPerfil();
  await loadFixos();
  await loadGastos();
}
</script>
