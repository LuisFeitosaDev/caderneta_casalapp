<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Caderneta do Casal</title>
<style>
  :root{
    --bg:#F3F5F7;
    --surface:#FFFFFF;
    --border:#E1E5EA;
    --ink:#161B22;
    --ink-soft:#6B7280;
    --accent:#1F3A5F;
    --accent-soft:#E8EDF3;
    --positive:#1F6F54;
    --negative:#A8392B;
    --cat-1:#1F6F54;
    --cat-2:#2A4D78;
    --cat-3:#A8392B;
    --cat-4:#8A6A1E;
    --shadow: 0 1px 2px rgba(16,24,32,0.04), 0 4px 14px rgba(16,24,32,0.06);
  }
  html[data-theme="dark"]{
    --bg:#0E1217;
    --surface:#161B22;
    --border:#262D37;
    --ink:#EAEDF1;
    --ink-soft:#8B94A3;
    --accent:#5B86B8;
    --accent-soft:#1C2733;
    --positive:#3FA383;
    --negative:#D2685A;
    --cat-1:#3FA383;
    --cat-2:#5B86B8;
    --cat-3:#D2685A;
    --cat-4:#C9A23F;
    --shadow: 0 1px 2px rgba(0,0,0,0.3), 0 4px 14px rgba(0,0,0,0.35);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    min-height:100vh;
    padding-bottom:96px;
    transition:background .15s,color .15s;
  }

  /* prevent pull-to-refresh and overscroll globally when modal open */
  body.modal-open{
    overflow:hidden;
    overscroll-behavior:none;
    touch-action:none;
  }

  svg.icon{width:18px;height:18px;stroke:currentColor;stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round;display:block;}
  .num{font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace; font-weight:600; font-feature-settings:"tnum";}
  .wrap{max-width:560px;margin:0 auto;padding:18px 16px 0;}

  /* lock screen */
  .lock-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px;}
  .lock-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px 24px;max-width:340px;width:100%;text-align:center;box-shadow:var(--shadow);}
  .lock-icon{width:46px;height:46px;border-radius:12px;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;}
  .lock-card h2{font-size:17px;font-weight:700;margin:0 0 4px;color:var(--ink);}
  .lock-card p{font-size:13px;color:var(--ink-soft);margin:0 0 16px;}
  .lock-card input{width:100%;text-align:center;font-size:24px;letter-spacing:12px;padding:12px;border-radius:10px;border:1px solid var(--border);background:var(--bg);color:var(--ink);font-family:ui-monospace,monospace;margin-bottom:12px;}
  .lock-error{color:var(--negative);font-size:12.5px;margin-top:10px;min-height:16px;font-weight:600;}

  /* header */
  header.top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
  .brand{display:flex;align-items:center;gap:9px;}
  .brand-mark{width:30px;height:30px;border-radius:8px;background:var(--accent);display:flex;align-items:center;justify-content:center;color:#fff;flex:0 0 auto;}
  h1.brand-text{font-size:16.5px;font-weight:700;letter-spacing:-.1px;margin:0;color:var(--ink);line-height:1.15;}
  h1.brand-text .sub{display:block;font-size:11px;font-weight:500;color:var(--ink-soft);letter-spacing:.2px;}
  .top-actions{display:flex;gap:4px;}
  .icon-btn{background:none;border:none;cursor:pointer;color:var(--ink-soft);padding:8px;line-height:1;border-radius:9px;display:flex;align-items:center;justify-content:center;}
  .icon-btn:hover{background:var(--accent-soft);color:var(--accent);}

  .month-row{display:flex;align-items:center;justify-content:space-between;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:8px 6px;margin:14px 0 16px;box-shadow:var(--shadow);}
  .month-row button{background:none;border:none;color:var(--ink-soft);cursor:pointer;width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;}
  .month-row button:hover{background:var(--accent-soft);color:var(--accent);}
  .month-label{font-size:14.5px;font-weight:600;text-transform:capitalize;letter-spacing:-.1px;}

  /* summary card */
  .summary{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px 16px 12px;box-shadow:var(--shadow);margin-bottom:16px;}
  .summary-top{display:flex;justify-content:space-between;margin-bottom:14px;}
  .summary-stat .label{font-size:10.5px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.5px;font-weight:600;}
  .summary-stat .value{font-size:17px;font-weight:700;display:flex;align-items:center;gap:5px;}
  .summary-stat.saldo .value{color:var(--positive);}
  .summary-stat.saldo.negativo .value{color:var(--negative);}

  .mood-line{display:flex;align-items:center;justify-content:center;gap:8px;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:9px 12px;margin-bottom:14px;font-size:12.5px;color:var(--ink-soft);font-weight:600;text-align:center;}
  .mood-line .big-emoji{font-size:22px;}

  .meta-wrap{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:14px;}
  .meta-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;}
  .meta-label{font-size:11px;color:var(--ink-soft);font-weight:700;text-transform:uppercase;letter-spacing:.4px;}
  .meta-value{font-size:12px;font-weight:700;}
  .meta-track{height:8px;background:var(--surface);border:1px solid var(--border);border-radius:5px;overflow:hidden;}
  .meta-fill{height:100%;border-radius:5px;background:var(--positive);transition:width .3s;}
  .meta-fill.negativo{background:var(--negative);}

  .comp-arrow{display:inline-flex;align-items:center;gap:2px;font-weight:700;font-size:10px;}
  .comp-arrow.up{color:var(--negative);}
  .comp-arrow.down{color:var(--positive);}
  .comp-arrow.flat{color:var(--ink-soft);}
  .comp-arrow svg{width:10px;height:10px;}

  .reacao-btn{background:none;border:none;color:var(--ink-soft);cursor:pointer;padding:4px;flex:0 0 auto;border-radius:7px;display:flex;align-items:center;font-size:15px;line-height:1;}
  .reacao-btn:hover{background:var(--accent-soft);}
  .reacao-badge{font-size:15px;line-height:1;padding:3px 6px;border-radius:7px;background:var(--accent-soft);}

  .reacao-popover{position:fixed;z-index:60;background:var(--surface);border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow);padding:10px;display:flex;gap:4px;flex-wrap:wrap;max-width:220px;}
  .reacao-popover button{background:none;border:none;font-size:20px;cursor:pointer;padding:5px;border-radius:8px;line-height:1;}
  .reacao-popover button:hover{background:var(--accent-soft);}
  .reacao-overlay-click{position:fixed;inset:0;z-index:55;}

  .bars{display:flex;flex-direction:column;gap:6px;margin-bottom:4px;}
  .bar-row{display:flex;align-items:center;gap:10px;cursor:pointer;border-radius:8px;padding:4px;margin:0 -4px;transition:background .12s;}
  .bar-row:hover{background:var(--accent-soft);}
  .bar-row.active{background:var(--accent-soft);box-shadow:inset 0 0 0 1px var(--accent);}
  .bar-icon{width:22px;height:22px;border-radius:6px;flex:0 0 auto;color:#fff;display:flex;align-items:center;justify-content:center;}
  .bar-icon svg{width:13px;height:13px;}
  .bar-track{flex:1;height:7px;background:var(--bg);border-radius:4px;overflow:hidden;border:1px solid var(--border);}
  .bar-fill{height:100%;border-radius:4px;}
  .bar-text{font-size:10.5px;color:var(--ink-soft);min-width:96px;text-align:right;white-space:nowrap;}
  .bar-name{font-size:12px;min-width:84px;font-weight:600;}

  /* filter chip + search */
  .filter-chip-wrap{margin-bottom:10px;display:none;}
  .filter-chip{display:inline-flex;align-items:center;gap:7px;background:var(--accent);color:#fff;padding:7px 11px;border-radius:999px;font-size:12px;font-weight:600;cursor:pointer;}

  /* Search box with clear button */
  .search-box{position:relative;margin-bottom:14px;}
  .search-box .search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--ink-soft);width:16px;height:16px;pointer-events:none;}
  .search-box input{width:100%;padding:11px 36px 11px 36px;border-radius:10px;border:1px solid var(--border);background:var(--surface);font-size:14px;color:var(--ink);font-family:inherit;}
  .search-clear{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:var(--ink-soft);border:none;cursor:pointer;color:#fff;width:18px;height:18px;border-radius:50%;display:none;align-items:center;justify-content:center;padding:0;line-height:1;}
  .search-clear.visible{display:flex;}
  .search-clear svg{width:10px;height:10px;stroke:#fff;stroke-width:2.5;}

  /* list */
  .day-label{font-size:10.5px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.6px;margin:18px 2px 8px;font-weight:700;}

  /* Swipe-to-delete item wrapper */
  .item-wrap{position:relative;margin-bottom:8px;border-radius:12px;overflow:hidden;}
  .item-swipe-bg{
    position:absolute;inset:0;background:var(--negative);border-radius:12px;
    display:flex;align-items:center;justify-content:flex-end;padding-right:20px;
    color:#fff;font-size:13px;font-weight:700;gap:7px;
    opacity:0;transition:opacity .1s;
    pointer-events:none;
  }
  .item-swipe-bg svg{width:18px;height:18px;stroke:#fff;stroke-width:2;fill:none;flex-shrink:0;}
  .item-swipe-bg.revealed{opacity:1;}

  .item{
    background:var(--surface);border:1px solid var(--border);
    border-radius:12px;padding:11px 12px;
    display:flex;align-items:flex-start;gap:11px;box-shadow:var(--shadow);cursor:pointer;
    position:relative;z-index:1;
    transform:translateX(0);
    transition:transform .25s cubic-bezier(.4,0,.2,1), border-color .15s;
    will-change:transform;
    touch-action:pan-y;
  }
  .item:hover{border-color:var(--accent);}
  .item.swiping{transition:none;}
  .item.snap-back{transition:transform .3s cubic-bezier(.4,0,.2,1);}

  .cat-chip{width:34px;height:34px;border-radius:9px;flex:0 0 auto;display:flex;align-items:center;justify-content:center;color:#fff;margin-top:1px;}
  .cat-chip svg{width:16px;height:16px;}
  .item-info{flex:1;min-width:0;}
  .item-desc{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .item-meta{font-size:11.5px;color:var(--ink-soft);margin-top:1px;}
  .item-obs{font-size:11.5px;color:var(--ink-soft);margin-top:2px;font-style:italic;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .item-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex:0 0 auto;}
  .item-val{font-size:14.5px;white-space:nowrap;font-weight:700;}
  .item-actions{display:flex;gap:2px;}
  .del-btn{background:none;border:none;color:var(--ink-soft);cursor:pointer;padding:4px;flex:0 0 auto;border-radius:7px;display:flex;align-items:center;gap:4px;font-size:11px;font-weight:600;}
  .del-btn:hover{color:var(--negative);}
  .del-btn.armed{color:var(--negative);}
  .cancel-btn:hover{color:var(--accent);}
  .cancel-btn.armed{color:var(--accent);}
  .dup-btn:hover{color:var(--accent);}

  .empty{text-align:center;color:var(--ink-soft);padding:40px 10px;font-size:13.5px;}

  /* fab */
  .fab{position:fixed;bottom:24px;right:50%;transform:translateX(50%) translateX(244px);width:54px;height:54px;border-radius:50%;background:var(--accent);color:#fff;border:none;box-shadow:0 6px 18px rgba(31,58,95,0.35);cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:40;}
  .fab svg{width:24px;height:24px;}
  @media (max-width:560px){.fab{right:20px;transform:none;}}

  /* overlay/modal */
  .overlay{position:fixed;inset:0;background:rgba(10,14,20,0.5);display:flex;align-items:flex-end;justify-content:center;z-index:50;}
  .overlay.hidden{display:none;}
  .sheet{background:var(--bg);width:100%;max-width:560px;border-radius:18px 18px 0 0;padding:18px 18px 24px;max-height:88vh;overflow-y:auto;box-shadow:0 -8px 30px rgba(0,0,0,0.25);border-top:1px solid var(--border);overscroll-behavior:contain;touch-action:pan-y;transition:transform .3s cubic-bezier(.4,0,.2,1);will-change:transform;}
  .sheet.dragging{transition:none;}
  .sheet.dismissing{transform:translateY(100%) !important;transition:transform .28s cubic-bezier(.4,0,.2,1) !important;}
  .sheet h2{font-size:16.5px;font-weight:700;margin:2px 0 16px;letter-spacing:-.1px;}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:11px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px;font-weight:600;}
  .field input[type=text],.field input[type=date],.field input[type=number],.field select{width:100%;padding:11px 12px;border-radius:9px;border:1px solid var(--border);background:var(--surface);font-size:14.5px;color:var(--ink);font-family:inherit;appearance:none;-webkit-appearance:none;}
  .field select{background-image:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="%236B7280" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>');background-repeat:no-repeat;background-position:right 10px center;background-size:16px;padding-right:34px;}
  .valor-input{width:100%;padding:12px 12px;border-radius:9px;border:1px solid var(--border);background:var(--surface);font-size:25px;font-family:ui-monospace,Menlo,Consolas,monospace;color:var(--ink);font-weight:700;}
  .pill-row{display:flex;gap:8px;flex-wrap:wrap;}
  .pill{padding:8px 13px;border-radius:9px;border:1px solid var(--border);background:var(--surface);font-size:13px;font-weight:600;cursor:pointer;color:var(--ink-soft);display:inline-flex;align-items:center;gap:6px;}
  .pill svg{width:14px;height:14px;}
  .pill.active{color:#fff;border-color:transparent;}
  .toggle-row{display:flex;gap:8px;}
  .toggle-row .pill{flex:1;justify-content:center;}
  .save-btn{width:100%;padding:13px;border-radius:10px;border:none;background:var(--accent);color:#fff;font-size:15px;font-weight:700;cursor:pointer;margin-top:6px;}
  .save-btn:disabled{opacity:.5;}
  .cancel-link{display:block;text-align:center;margin-top:12px;color:var(--ink-soft);font-size:13px;font-weight:600;background:none;border:none;cursor:pointer;width:100%;}
  .sheet-handle{width:36px;height:4px;background:var(--border);border-radius:3px;margin:0 auto 14px;}

  .two-col{display:flex;gap:10px;}
  .two-col .field{flex:1;}
  .hint{font-size:11.5px;color:var(--ink-soft);margin-top:5px;}
  .static-tag{display:inline-flex;align-items:center;padding:9px 13px;border-radius:9px;background:var(--accent-soft);color:var(--accent);font-size:13px;font-weight:600;}

  .toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--bg);padding:10px 18px;border-radius:9px;font-size:13px;font-weight:600;opacity:0;transition:opacity .25s;pointer-events:none;z-index:80;max-width:90%;text-align:center;}
  .toast.show{opacity:1;}

  /* Swipe confirm dialog */
  .swipe-confirm{
    position:fixed;inset:0;background:rgba(10,14,20,0.55);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;
  }
  .swipe-confirm.hidden{display:none;}
  .swipe-confirm-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px 20px;max-width:320px;width:100%;box-shadow:var(--shadow);}
  .swipe-confirm-card h3{font-size:15px;font-weight:700;margin:0 0 6px;}
  .swipe-confirm-card p{font-size:13px;color:var(--ink-soft);margin:0 0 18px;}
  .swipe-confirm-btns{display:flex;gap:10px;}
  .swipe-confirm-btns button{flex:1;padding:11px;border-radius:9px;border:none;font-size:14px;font-weight:700;cursor:pointer;}
  .swipe-confirm-cancel{background:var(--bg);color:var(--ink);border:1px solid var(--border) !important;}
  .swipe-confirm-delete{background:var(--negative);color:#fff;}

  .status-line{text-align:center;color:var(--ink-soft);font-size:12px;padding:14px 0;}
</style>
</head>

<!-- LOCK SCREEN -->
<div class="lock-screen" id="lockScreen">
  <div class="lock-card">
    <div class="lock-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:22px;height:22px"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>
    </div>
    <h2>Caderneta do Casal</h2>

</div>

function sb(path, opts = {}) {
  return supabaseClient.auth.getSession().then(({ data: { session } }) => {
    const token = session && session.access_token ? session.access_token : SUPABASE_ANON_KEY;
    return fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
      ...opts,
      headers: {
        "apikey": SUPABASE_ANON_KEY,
        "Authorization": `Bearer ${token}`,

  });

/* ============================================================
   SENHA (verificada no servidor via Edge Function)
   ============================================================ */
let failedAttempts = 0;
let lockoutUntil = 0;
let lockoutTimer = null;

function startLockoutCountdown(seconds){
  const btn = document.getElementById("lockBtn");
  const errEl = document.getElementById("lockError");
  const input = document.getElementById("lockInput");
  lockoutUntil = Date.now() + seconds * 1000;
  input.disabled = true;
  btn.disabled = true;

  clearInterval(lockoutTimer);
  lockoutTimer = setInterval(() => {
    const remaining = Math.ceil((lockoutUntil - Date.now()) / 1000);
    if(remaining <= 0){
      clearInterval(lockoutTimer);
      errEl.textContent = "";
      input.disabled = false;
      btn.disabled = false;
      input.focus();
      return;
    }
    errEl.textContent = `Muitas tentativas. Aguarde ${remaining}s.`;
  }, 250);
}

async function tryUnlock(){
  const input = document.getElementById("lockInput");
  const btn = document.getElementById("lockBtn");
  const errEl = document.getElementById("lockError");
  const val = input.value;

  if(Date.now() < lockoutUntil) return; // ainda em cooldown local
  if(!val){ return; }

  btn.disabled = true;
  btn.textContent = "Verificando...";
  errEl.textContent = "";

  try {
    const res = await fetch(`${SUPABASE_URL}/functions/v1/verify-pin`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "apikey": SUPABASE_ANON_KEY,
        "Authorization": `Bearer ${SUPABASE_ANON_KEY}`
      },
      body: JSON.stringify({ pin: val })
    });
    const data = await res.json();

    if(!res.ok){
      input.value = "";
      input.focus();

      // 429 = a própria Edge Function já bloqueou por excesso de tentativas
      if(res.status === 429){
        startLockoutCountdown(15 * 60);
        return;
      }

      failedAttempts++;
      if(failedAttempts >= 3){
        failedAttempts = 0;
        startLockoutCountdown(30);
        return;
      }

      errEl.textContent = data.error || "Senha incorreta. Tente novamente.";
      return;
    }

    failedAttempts = 0;

    const { error } = await supabaseClient.auth.setSession({
      access_token: data.access_token,
      refresh_token: data.refresh_token
    });

    if(error){
      errEl.textContent = "Não foi possível iniciar a sessão.";
      return;
    }

    showApp();
  } catch(e){
    errEl.textContent = "Erro de conexão. Tente novamente.";
  } finally {
    if(Date.now() >= lockoutUntil){
      btn.disabled = false;
      btn.textContent = "Entrar";
    }
  }
}
document.getElementById("lockInput").addEventListener("keydown", function(e){ if(e.key==="Enter") tryUnlock(); });

function showApp(){
  document.getElementById("lockScreen").style.display = "none";
  mountAppContent();
  document.getElementById("appContent").style.display = "block";
  initApp();
}

  await supabaseClient.auth.signOut();
  window.location.reload();
}

function iconForDesc(descricao) {
  const d = (descricao || "").toLowerCase();
  if (d.includes("pet") || d.includes("gato") || d.includes("cachorro") || d.includes("animal")) return "pet";
  if (d.includes("academia") || d.includes("gym") || d.includes("fitness")) return "academia";
  if (d.includes("apartamento") || d.includes("aluguel") || d.includes("aluguel")) return "apt";
  if (d.includes("condomínio") || d.includes("condominio")) return "condo";
  if (d.includes("energia") || d.includes("luz") || d.includes("eletricidade")) return "energia";
  if (d.includes("internet") || d.includes("wi-fi") || d.includes("wifi") || d.includes("banda")) return "internet";
  if (d.includes("mercado") || d.includes("supermercado") || d.includes("feira")) return "mercado";
  if (d.includes("ifood") || d.includes("fastfood") || d.includes("fast food") || d.includes("delivery") || d.includes("restaurante") || d.includes("lanche") || d.includes("comida")) return "food";
  if (d.includes("farmácia") || d.includes("farmacia") || d.includes("remédio") || d.includes("remedios") || d.includes("saúde")) return "farmacia";
  if (d.includes("streaming") || d.includes("netflix") || d.includes("prime") || d.includes("disney") || d.includes("spotify") || d.includes("youtube")) return "streaming";
  if (d.includes("uber") || d.includes("99") || d.includes("táxi") || d.includes("taxi") || d.includes("transporte")) return "uber";
  if (d.includes("shoppe") || d.includes("shopee") || d.includes("amazon") || d.includes("mercadolivre") || d.includes("compra online")) return "shoppe";
  if (d.includes("assinatura") || d.includes("plano") || d.includes("mensalidade")) return "assinatura";

  if (d.includes("dízimo") || d.includes("dizimo") || d.includes("dízmo") || d.includes("oferta") || d.includes("igreja")) return "dizimo";
  return "neutro";
}

function isoDate(d){ const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,"0"),day=String(d.getDate()).padStart(2,"0"); return `${y}-${m}-${day}`; }
function addMonths(dateStr,n){ const [y,m,d]=dateStr.split("-").map(Number); const base=new Date(y,(m-1)+n,1); const lastDay=new Date(base.getFullYear(),base.getMonth()+1,0).getDate(); const day=Math.min(d,lastDay); return isoDate(new Date(base.getFullYear(),base.getMonth(),day)); }
function monthRange(d){ const start=new Date(d.getFullYear(),d.getMonth(),1); const end=new Date(d.getFullYear(),d.getMonth()+1,0); return {start:isoDate(start),end:isoDate(end)}; }

/* ============================================================
   MONTAGEM DO CONTEÚDO DO APP (só acontece após login confirmado)
   Isso evita que a estrutura da interface fique no DOM antes da
   autenticação — quem inspecionar a página deslogado só vê a tela
   de senha, mais nada.
   ============================================================ */
function mountAppContent(){
  const appEl = document.getElementById('appContent');
  if(appEl.dataset.mounted === "1") return; // evita remontar em relogins
  appEl.innerHTML = APP_CONTENT_HTML;
  appEl.dataset.mounted = "1";

  // --- Fechar clicando no backdrop (fora do sheet) ---
  document.getElementById('addOverlay').addEventListener('pointerdown', function(e) {
    if(e.target === this) dismissSheet('add');
  });
  document.getElementById('settingsOverlay').addEventListener('pointerdown', function(e) {
    if(e.target === this) dismissSheet('settings');
  });

  // --- Arrastar sheet para baixo para fechar ---
  setupSheetDrag(document.getElementById('addSheet'), () => dismissSheet('add'));
  setupSheetDrag(document.querySelector('#settingsOverlay .sheet'), () => dismissSheet('settings'));

  // --- Bloquear pull-to-refresh no backdrop ---
  ['addOverlay','settingsOverlay'].forEach(id => {
    const el = document.getElementById(id);
    if(!el) return;
    el.addEventListener('touchmove', (e) => {
      if(e.target === el) e.preventDefault();
    }, { passive: false });
  });
}

function dismissSheet(which) {
  const overlayId = which === 'add' ? 'addOverlay' : 'settingsOverlay';
  const sheetEl = document.querySelector(`#${overlayId} .sheet`);
  // Animate out
  sheetEl.classList.add('dismissing');
  setTimeout(() => {
    sheetEl.classList.remove('dismissing');
    sheetEl.style.transform = '';
    if(which === 'add') closeAdd();
    else closeSettings();
  }, 290);
}

function setupSheetDrag(sheetEl, onDismiss) {
  if(!sheetEl) return;
  let startY = 0;
  let currentY = 0;
  let isDragging = false;
  let startScrollTop = 0;

  sheetEl.addEventListener('touchstart', (e) => {
    startY = e.touches[0].clientY;
    startScrollTop = sheetEl.scrollTop;
    isDragging = false;
    currentY = 0;
    sheetEl.classList.remove('dragging');
  }, { passive: true });

  sheetEl.addEventListener('touchmove', (e) => {
    const dy = e.touches[0].clientY - startY;
    currentY = dy;

    // Only drag-to-dismiss if sheet is scrolled to top AND dragging down
    if(startScrollTop > 2 || dy < 0) return;

    // Threshold before starting drag
    if(Math.abs(dy) > 6 && !isDragging) {
      isDragging = true;
      sheetEl.classList.add('dragging');
    }

    if(isDragging) {
      e.preventDefault();
      // Rubber-band: resist going up, allow going down
      const drag = Math.max(0, dy);
      const rubberband = drag > 120 ? 120 + (drag - 120) * 0.25 : drag;
      sheetEl.style.transform = `translateY(${rubberband}px)`;
    }
  }, { passive: false });

  sheetEl.addEventListener('touchend', () => {
    sheetEl.classList.remove('dragging');
    if(!isDragging) return;

    const drag = Math.max(0, currentY);
    if(drag > 100) {
      // Dismiss
      onDismiss();
    } else {
      // Snap back
      sheetEl.style.transition = 'transform .25s cubic-bezier(.4,0,.2,1)';
      sheetEl.style.transform = 'translateY(0)';
      setTimeout(() => { sheetEl.style.transition = ''; }, 260);
    }
    isDragging = false;
  }, { passive: true });
}

/* ============================================================
   MÁSCARA CONTÁBIL NO CAMPO VALOR
   ============================================================ */
function formatAccountingValue(raw) {
  // strip non-digits
  const digits = raw.replace(/\D/g,'');
  if(!digits || digits === '0') return '0,00';
  // pad to at least 3 digits
  const padded = digits.padStart(3,'0');
  const cents = padded.slice(-2);
  const units = padded.slice(0, -2);
  // remove leading zeros from units
  const unitsClean = units.replace(/^0+/,'') || '0';
  // thousands separator
  const unitsFormatted = unitsClean.replace(/\B(?=(\d{3})+(?!\d))/g,'.');
  return unitsFormatted + ',' + cents;
}

function setupValorInput() {
  const input = document.getElementById('fValor');
  if(!input) return;
  input.addEventListener('input', function(e) {
    const raw = this.value.replace(/\D/g,'');
    this.value = formatAccountingValue(raw);
    // Put cursor at end
    const len = this.value.length;
    this.setSelectionRange(len,len);
  });
  input.addEventListener('keydown', function(e) {
    if(e.key === 'Backspace') {
      e.preventDefault();
      const raw = this.value.replace(/\D/g,'');
      const newRaw = raw.slice(0,-1);
      this.value = formatAccountingValue(newRaw);
    }
  });
}

function getValorAsFloat() {
  const raw = document.getElementById('fValor').value;
  // e.g. "1.234,56" -> 1234.56
  return parseFloat(raw.replace(/\./g,'').replace(',','.')) || 0;
}

function setValorDisplay(val) {
  // val is a number or string like 1234.56
  const cents = Math.round(Number(val) * 100);
  const raw = String(cents);
  document.getElementById('fValor').value = formatAccountingValue(raw);
}

/* ============================================================
   SWIPE TO DELETE
   ============================================================ */
let swipePendingGasto = null;

function attachSwipeDelete(itemEl, g) {
  // Only enable swipe delete for non-virtual, non-parcela items
  // (Parcela swipe: only delete the single entry, not cancel future)
  if(g.__virtual) return; // fixos use the trash button

  let startX = 0;
  let startY = 0;
  let currentX = 0;
  let isDragging = false;
  let isHorizontal = null;
  const THRESHOLD = 80; // px to reveal
  const DELETE_THRESHOLD = 160; // px to auto-trigger

  const bgEl = itemEl.previousElementSibling; // .item-swipe-bg

  function onTouchStart(e) {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    currentX = 0;
    isDragging = false;
    isHorizontal = null;
    itemEl.classList.add('swiping');
  }

  function onTouchMove(e) {
    const dx = e.touches[0].clientX - startX;
    const dy = e.touches[0].clientY - startY;

    if(isHorizontal === null) {
      if(Math.abs(dx) > 5 || Math.abs(dy) > 5) {
        isHorizontal = Math.abs(dx) > Math.abs(dy);
      }
      return;
    }

    if(!isHorizontal) return; // vertical scroll — let it pass

    e.preventDefault(); // block page scroll during horizontal swipe
    e.stopPropagation();

    // Only allow left swipe (negative dx)
    currentX = Math.min(0, dx);
    // Apply with rubber band effect past threshold
    let translateX = currentX;
    if(Math.abs(currentX) > THRESHOLD) {
      const extra = Math.abs(currentX) - THRESHOLD;
      translateX = -(THRESHOLD + extra * 0.35);
    }
    itemEl.style.transform = `translateX(${translateX}px)`;

    // Show background
    const progress = Math.min(1, Math.abs(translateX) / THRESHOLD);
    bgEl.style.opacity = progress;
    bgEl.classList.toggle('revealed', progress > 0.3);
    isDragging = true;
  }

  function onTouchEnd(e) {
    itemEl.classList.remove('swiping');
    isHorizontal = null;

    if(!isDragging) return;

    const swipeAmt = Math.abs(currentX);

    if(swipeAmt >= DELETE_THRESHOLD) {
      // auto snap to delete state and confirm
      itemEl.style.transform = `translateX(-${THRESHOLD}px)`;
      bgEl.classList.add('revealed');
      showSwipeConfirm(g, itemEl, bgEl);
    } else if(swipeAmt >= THRESHOLD * 0.5) {
      // Hold open for tap
      itemEl.classList.add('snap-back');
      itemEl.style.transform = `translateX(-${THRESHOLD}px)`;
      bgEl.classList.add('revealed');
      // Clicking bg triggers confirm
      bgEl.style.pointerEvents = 'auto';
      bgEl.onclick = () => showSwipeConfirm(g, itemEl, bgEl);
    } else {
      // Snap back
      snapBack(itemEl, bgEl);
    }

    isDragging = false;
  }

  itemEl.addEventListener('touchstart', onTouchStart, { passive: true });
  itemEl.addEventListener('touchmove', onTouchMove, { passive: false });
  itemEl.addEventListener('touchend', onTouchEnd, { passive: true });
}

function snapBack(itemEl, bgEl) {
  itemEl.classList.add('snap-back');
  itemEl.style.transform = 'translateX(0)';
  bgEl.style.opacity = '0';
  bgEl.classList.remove('revealed');
  bgEl.style.pointerEvents = 'none';
  bgEl.onclick = null;
  setTimeout(() => itemEl.classList.remove('snap-back'), 300);
}

function showSwipeConfirm(g, itemEl, bgEl) {
  swipePendingGasto = { g, itemEl, bgEl };
  const desc = document.getElementById("swipeConfirmDesc");
  desc.textContent = `"${g.descricao}" — ${fmtMoney(g.valor)}. Essa ação não pode ser desfeita.`;
  document.getElementById("swipeConfirm").classList.remove("hidden");
  lockBody();
}

function cancelSwipeDelete() {
  if(swipePendingGasto) {
    const { itemEl, bgEl } = swipePendingGasto;
    snapBack(itemEl, bgEl);
    swipePendingGasto = null;
  }
  document.getElementById("swipeConfirm").classList.add("hidden");
  unlockBody();
}

async function confirmSwipeDelete() {
  if(!swipePendingGasto) return;
  const { g } = swipePendingGasto;
  document.getElementById("swipeConfirm").classList.add("hidden");
  unlockBody();
  swipePendingGasto = null;
  await deleteGasto(g.id);
}

}

function virtuaisDoMes(monthDate){
  const y=monthDate.getFullYear(), m=monthDate.getMonth();
  const mesAtual=y*12+m;
  const lastDay=new Date(y,m+1,0).getDate();
  return state.fixos.filter(f=>{
    const mesInicio=mesIndex(f.data_inicio);
    const mesFim=f.data_fim?mesIndex(f.data_fim):Infinity;
    return mesAtual>=mesInicio && mesAtual<mesFim;
  }).map(f=>{
    const day=Math.min(f.dia,lastDay);
    const data=isoDate(new Date(y,m,day));
    return {
      id:`fixo-${f.id}-${data}`,__virtual:true,fixoId:f.id,
      descricao:f.descricao,observacao:f.observacao,categoria:f.categoria,
      pessoa:f.pessoa,valor:Number(f.valor),tipo:"Fixo",data,
      parcela_grupo_id:null,parcela_atual:null,parcela_total:null
    };
  });
}

async function loadGastos(){
  state.loading=true;
  renderStatus("Carregando...");
  const {start,end}=monthRange(state.monthDate);
  const res=await sb(`gastos?data=gte.${start}&data=lte.${end}&select=*&order=data.desc,created_at.desc`);
  let avulsos=[];
  if(res.ok){ avulsos=await res.json(); }
  else { renderStatus("Não foi possível carregar. Veja se a tabela 'gastos' existe no Supabase."); }
  const fixosDoMes=virtuaisDoMes(state.monthDate);
  state.gastos=[...avulsos,...fixosDoMes].sort((a,b)=>b.data.localeCompare(a.data));
  await loadComparativoMesAnterior();
  state.loading=false;
  renderAll();
}

/* Totais por categoria do mês anterior, para a seta de comparação */
async function loadComparativoMesAnterior(){
  const d=state.monthDate;
  const prevDate=new Date(d.getFullYear(),d.getMonth()-1,1);
  const {start,end}=monthRange(prevDate);
  const res=await sb(`gastos?data=gte.${start}&data=lte.${end}&select=categoria,valor`);
  let avulsos=[];
  if(res.ok){ avulsos=await res.json(); }
  const fixosDoMesAnterior=virtuaisDoMes(prevDate);
  const todos=[...avulsos,...fixosDoMesAnterior];
  const totals={};
  CATS.forEach(c=>{ totals[c.nome]=0; });
  todos.forEach(g=>{ totals[g.categoria]=(totals[g.categoria]||0)+Number(g.valor); });
  state.prevCatTotals=totals;
}

function getMood(saldo,renda){
  const pct=renda>0?(saldo/renda):(saldo>0?1:(saldo<0?-1:0));
  if(saldo<0) return {emoji:"😟",label:"Mês no vermelho"};
  if(pct<0.05) return {emoji:"😐",label:"Mês neutro — sobrou pouco"};
  return {emoji:"😄",label:"Mês positivo"};
}

function renderMetaEconomia(saldo){
  const wrap=document.getElementById("metaWrap");
  const meta=Number(state.perfil.meta_economia||0);
  if(!meta || meta<=0){ wrap.style.display="none"; wrap.innerHTML=""; return; }
  wrap.style.display="block";
  const pct=Math.max(0,Math.min(100,(saldo/meta)*100));
  const atingiu=saldo>=meta;
  wrap.innerHTML=`
    <div class="meta-top">
      <span class="meta-label">${atingiu?"🎯 Meta de economia atingida":"Meta de economia"}</span>
      <span class="meta-value">${fmtMoney(Math.max(0,saldo))} / ${fmtMoney(meta)}</span>
    </div>
    <div class="meta-track"><div class="meta-fill${saldo<0?" negativo":""}" style="width:${saldo<0?100:pct}%"></div></div>
  `;
}

/* Seta comparando o gasto da categoria com o mesmo total do mês anterior */
function compArrowHtml(categoria,valorAtual){
  const prev=Number(state.prevCatTotals[categoria]||0);
  if(prev<=0 && valorAtual<=0) return "";
  const diff=valorAtual-prev;
  const limiar=Math.max(prev*0.03,1); // ignora variações irrisórias
  let dir="flat", seta="";
  if(diff>limiar){ dir="up"; seta='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><path d="M12 19V5M6 11l6-6 6 6"/></svg>'; }
  else if(diff<-limiar){ dir="down"; seta='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><path d="M12 5v14M6 13l6 6 6-6"/></svg>'; }
  else { seta='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><path d="M5 12h14"/></svg>'; }
  return `<span class="comp-arrow ${dir}" title="Mês anterior: ${fmtMoney(prev)}">${seta}${fmtMoney(Math.abs(diff))}</span>`;
}

function renderSummary(){
  const renda=Number(state.perfil.renda_pessoa1||0)+Number(state.perfil.renda_pessoa2||0);
  const totalGasto=state.gastos.reduce((s,g)=>s+Number(g.valor),0);

  document.getElementById("stRenda").textContent=fmtMoney(renda);
  document.getElementById("stGasto").textContent=fmtMoney(totalGasto);
  const saldoEl=document.getElementById("stSaldo");
  const mood=getMood(saldo,renda);
  saldoEl.textContent=fmtMoney(saldo);
  saldoEl.parentElement.classList.toggle("negativo",saldo<0);
  const moodLine=document.getElementById("moodLine");
  moodLine.innerHTML=`<span class="big-emoji">${mood.emoji}</span><span>${mood.label}</span>`;

  renderMetaEconomia(saldo);

  const barsEl=document.getElementById("bars");
  barsEl.innerHTML="";
  CATS.forEach(cat=>{
    const gastoCat=state.gastos.filter(g=>g.categoria===cat.nome).reduce((s,g)=>s+Number(g.valor),0);
    const idealValor=renda*cat.ideal;
    const pct=idealValor>0?Math.min(100,(gastoCat/idealValor)*100):(gastoCat>0?100:0);
    const row=document.createElement("div");
    row.className="bar-row"+(state.categoriaFiltro===cat.nome?" active":"");
    row.innerHTML=`
      <div class="bar-icon" style="background:${cat.cor}">${cat.icon}</div>
      <div class="bar-name">${cat.nome}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${cat.cor}"></div></div>
      <div class="bar-text">${fmtMoney(gastoCat)} <span style="opacity:.6">/ ${fmtMoney(idealValor)}</span> ${compArrowHtml(cat.nome,gastoCat)}</div>
    `;
    row.onclick=()=>{
      state.categoriaFiltro=(state.categoriaFiltro===cat.nome)?null:cat.nome;
      renderSummary(); renderFilterChip(); renderList();
    };
    barsEl.appendChild(row);
  });
}

function renderFilterChip(){
  const el=document.getElementById("filterChipWrap");
  if(state.categoriaFiltro){
    el.style.display="block";
    el.innerHTML=`<span class="filter-chip">${escapeHtml(state.categoriaFiltro)} <span style="font-size:14px">✕</span></span>`;

function getFilteredGastos(){
  const term=(state.searchTerm||"").trim().toLowerCase();
  return state.gastos.filter(g=>{
    if(state.categoriaFiltro && g.categoria!==state.categoriaFiltro) return false;
    if(term){ const hay=`${g.descricao} ${g.observacao||""} ${g.pessoa} ${g.categoria}`.toLowerCase(); if(!hay.includes(term)) return false; }
    return true;
  });
}

function renderList(){

  let lastDate=null;

      const lbl=document.createElement("div");
      lbl.className="day-label";
      const d=new Date(g.data+"T00:00:00");
      lbl.textContent=d.toLocaleDateString("pt-BR",{weekday:"short",day:"2-digit",month:"short"});
      listEl.appendChild(lbl);
    }

    const cat=catByName(g.categoria)||CATS[2];
    const isParcelada = !!g.parcela_grupo_id;

    // wrapper for swipe
    const wrap=document.createElement("div");
    wrap.className="item-wrap";

    // swipe background (delete reveal)
    const bgEl=document.createElement("div");
    bgEl.className="item-swipe-bg";
    bgEl.innerHTML=`<svg viewBox="0 0 24 24"><path d="M4 7h16"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M6 7l1 13a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1l1-13"/><path d="M9 7V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v3"/></svg> Excluir`;
    wrap.appendChild(bgEl);

    const item=document.createElement("div");
    item.className="item";

    let metaTxt=`${g.pessoa} · ${g.tipo}`;
    if(g.parcela_total){ metaTxt+=` · Parcela ${g.parcela_atual}/${g.parcela_total}`; }
    if(g.__virtual){ metaTxt+=` · Recorrente`; }

    const showCancelParcela=g.parcela_grupo_id && g.parcela_atual<g.parcela_total;

    // Use description-specific icon instead of category icon
    const descIconSvg = getDescIcon(g.descricao);
    // Replace class="icon" with inline size for cat-chip
    const chipIcon = descIconSvg.replace('class="icon"', 'style="width:16px;height:16px;stroke:currentColor;stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round;"');

    item.innerHTML=`
      <div class="cat-chip" style="background:${cat.cor}">${chipIcon}</div>
      <div class="item-info">
        <div class="item-desc">${escapeHtml(g.descricao)}</div>
        <div class="item-meta">${metaTxt}</div>
        ${g.observacao?`<div class="item-obs">Obs: ${escapeHtml(g.observacao)}</div>`:''}
      </div>
      <div class="item-right">
        <div class="item-val num">${fmtMoney(g.valor)}</div>
        ${g.reacao?`<div class="reacao-badge">${g.reacao}</div>`:''}
        <div class="item-actions"></div>
      </div>
    `;

    const actionsEl=item.querySelector(".item-actions");

    // Reação/combinado — só para gastos avulsos (fixos são virtuais e não têm linha própria por mês)
    if(!g.__virtual){
      const reactBtn=document.createElement("button");
      reactBtn.className="reacao-btn";
      reactBtn.title=g.reacao?"Trocar reação":"Reagir / combinado";
      reactBtn.textContent=g.reacao?"✏️":"😊";
      reactBtn.addEventListener("click",(e)=>{ e.stopPropagation(); openReactionPicker(g,reactBtn); });
      actionsEl.appendChild(reactBtn);
    }

    // "Jogar para o próximo mês" — only for non-parcelada items
    if(!isParcelada) {
      const dupBtn=document.createElement("button");
      dupBtn.className="del-btn dup-btn";
      dupBtn.title="Lançar no próximo mês";
      dupBtn.innerHTML=ICONS.forward;
      dupBtn.addEventListener("click",(e)=>{ e.stopPropagation(); duplicateToNextMonth(g); });
      actionsEl.appendChild(dupBtn);
    }

    if(g.__virtual){
      const endBtn=document.createElement("button");
      endBtn.className="del-btn";
      endBtn.title="Remover a partir deste mês";
      endBtn.innerHTML=ICONS.trash;
      endBtn.addEventListener("click",(e)=>{ e.stopPropagation(); handleEndFixo(endBtn,g.fixoId); });
      actionsEl.appendChild(endBtn);
    } else {
      if(showCancelParcela){
        const cancelBtn=document.createElement("button");
        cancelBtn.className="del-btn cancel-btn";
        cancelBtn.title="Cancelar parcelas futuras";
        cancelBtn.innerHTML=ICONS.ban;
        cancelBtn.addEventListener("click",(e)=>{ e.stopPropagation(); handleCancelFuture(cancelBtn,g.parcela_grupo_id,g.data); });
        actionsEl.appendChild(cancelBtn);
      }
      const delBtn=document.createElement("button");
      delBtn.className="del-btn";
      delBtn.title="Excluir";
      delBtn.innerHTML=ICONS.trash;
      delBtn.addEventListener("click",(e)=>{ e.stopPropagation(); handleDelete(delBtn,g.id); });
      actionsEl.appendChild(delBtn);
    }

    item.addEventListener("click",()=>openEditItem(g));
    wrap.appendChild(item);
    listEl.appendChild(wrap);

    // Attach swipe behavior for non-virtual items
    if(!g.__virtual) {
      attachSwipeDelete(item, g);
    }
  });
}

/* ============================================================
   DUPLICAR PARA PRÓXIMO MÊS
   ============================================================ */
async function duplicateToNextMonth(g){
  const novaData=addMonths(g.data,1);
  const row={descricao:g.descricao,valor:g.valor,categoria:g.categoria,tipo:g.tipo,pessoa:g.pessoa,data:novaData,observacao:g.observacao||null};
  const res=await sb("gastos",{method:"POST",body:JSON.stringify([row])});
  if(res.ok){
    toast("Lançado no mês seguinte");
    const [ny,nm]=novaData.split("-").map(Number);
    if(state.monthDate.getFullYear()===ny&&(state.monthDate.getMonth()+1)===nm){ loadGastos(); }
  } else { toast("Não foi possível lançar no próximo mês"); }
}

/* ============================================================
   REAÇÃO / COMBINADO — emoji leve num gasto lançado pelo parceiro
   ============================================================ */
const REACAO_EMOJIS=['👍','❤️','😅','😬','✅','❓','🎉','😱'];
let openReactionState=null;

function closeReactionPicker(){
  if(openReactionState){
    openReactionState.popover.remove();
    openReactionState.overlay.remove();
    openReactionState=null;
  }
}

function openReactionPicker(g, btnEl){
  closeReactionPicker();

  const overlay=document.createElement("div");
  overlay.className="reacao-overlay-click";
  overlay.addEventListener("click",closeReactionPicker);
  document.body.appendChild(overlay);

  const pop=document.createElement("div");
  pop.className="reacao-popover";

  REACAO_EMOJIS.forEach(em=>{
    const b=document.createElement("button");
    b.textContent=em;
    b.addEventListener("click",(e)=>{ e.stopPropagation(); saveReaction(g,em); closeReactionPicker(); });
    pop.appendChild(b);
  });

  if(g.reacao){
    const clearBtn=document.createElement("button");
    clearBtn.textContent="✖️";
    clearBtn.title="Remover reação";
    clearBtn.addEventListener("click",(e)=>{ e.stopPropagation(); saveReaction(g,null); closeReactionPicker(); });
    pop.appendChild(clearBtn);
  }

  document.body.appendChild(pop);

  // Posiciona perto do botão, sem sair da tela
  const rect=btnEl.getBoundingClientRect();
  const popRect=pop.getBoundingClientRect();
  let top=rect.bottom+6;
  let left=Math.min(rect.left, window.innerWidth-popRect.width-12);
  left=Math.max(12,left);
  if(top+popRect.height>window.innerHeight-12){ top=rect.top-popRect.height-6; }
  pop.style.top=top+"px";
  pop.style.left=left+"px";

  openReactionState={popover:pop, overlay};
}

async function saveReaction(g, emoji){
  const res=await sb(`gastos?id=eq.${g.id}`,{method:"PATCH",body:JSON.stringify({reacao:emoji})});
  if(res.ok){
    g.reacao=emoji;
    renderList();
    toast(emoji?"Reação salva":"Reação removida");
  } else {
    toast("Não foi possível salvar a reação");
  }
}

/* ============================================================
   EXCLUSÃO
   ============================================================ */
let deleteArmedId=null;
function handleDelete(btn,id){
  if(deleteArmedId!==id){
    document.querySelectorAll(".del-btn.armed").forEach(b=>{ b.classList.remove("armed"); if(!b.classList.contains("cancel-btn")) b.innerHTML=ICONS.trash; });
    btn.classList.add("armed");
    btn.innerHTML=ICONS.trash+"<span>Confirmar</span>";
    deleteArmedId=id;
    setTimeout(()=>{ if(deleteArmedId===id){ btn.classList.remove("armed"); btn.innerHTML=ICONS.trash; deleteArmedId=null; } },3000);
    return;
  }
  deleteArmedId=null;
  deleteGasto(id);
}

async function deleteGasto(id){
  const res=await sb(`gastos?id=eq.${id}`,{method:"DELETE"});
  if(res.ok){ state.gastos=state.gastos.filter(g=>g.id!==id); renderAll(); toast("Gasto removido"); }
  else { toast("Não foi possível remover"); }
}

let cancelArmedKey=null;
function handleCancelFuture(btn,grupo,data){
  const key="parcela-"+grupo+data;
  if(cancelArmedKey!==key){
    document.querySelectorAll(".del-btn.armed").forEach(b=>{ b.classList.remove("armed"); b.innerHTML=b.classList.contains("cancel-btn")?ICONS.ban:ICONS.trash; });
    btn.classList.add("armed");
    btn.innerHTML=ICONS.ban+"<span>Confirmar</span>";
    cancelArmedKey=key;
    setTimeout(()=>{ if(cancelArmedKey===key){ btn.classList.remove("armed"); btn.innerHTML=ICONS.ban; cancelArmedKey=null; } },3000);
    return;
  }
  cancelArmedKey=null;
  cancelFutureInstallments(grupo,data);
}

async function cancelFutureInstallments(grupoId,dataAtual){
  const res=await sb(`gastos?parcela_grupo_id=eq.${grupoId}&data=gt.${dataAtual}`,{method:"DELETE"});
  if(res.ok){ toast("Parcelas futuras canceladas"); loadGastos(); }
  else { toast("Não foi possível cancelar as parcelas futuras"); }
}

let endFixoArmedId=null;
function handleEndFixo(btn,fixoId){
  if(endFixoArmedId!==fixoId){
    document.querySelectorAll(".del-btn.armed").forEach(b=>{ b.classList.remove("armed"); if(!b.classList.contains("cancel-btn")) b.innerHTML=ICONS.trash; });
    btn.classList.add("armed");
    btn.innerHTML=ICONS.trash+"<span>Confirmar</span>";
    endFixoArmedId=fixoId;
    setTimeout(()=>{ if(endFixoArmedId===fixoId){ btn.classList.remove("armed"); btn.innerHTML=ICONS.trash; endFixoArmedId=null; } },3000);
    return;
  }
  endFixoArmedId=null;
  endFixoFromMonth(fixoId);
}

async function endFixoFromMonth(fixoId){
  const {start}=monthRange(state.monthDate);
  const res=await sb(`fixos?id=eq.${fixoId}`,{method:"PATCH",body:JSON.stringify({data_fim:start})});
  if(res.ok){ toast("Fixo removido a partir deste mês"); await loadFixos(); loadGastos(); }
  else { toast("Não foi possível remover o fixo"); }
}

function changeMonth(delta){
  const d=state.monthDate;
  state.monthDate=new Date(d.getFullYear(),d.getMonth()+delta,1);
  loadGastos();
}

/* ============================================================
   MODAL: NOVO / EDITAR GASTO
   ============================================================ */
function openAdd(){
  state.editing=null;
  document.getElementById("fValor").value="0,00";
  document.getElementById("fObs").value="";
  document.getElementById("fData").value=isoDate(new Date());
  document.getElementById("fParcelas").value=2;
  state.catSel="Dispensáveis";
  state.pessoaSel=state.perfil.nome_pessoa1;
  state.tipoSel="Variável";
  state.parceladoSel=false;
  buildDescOptions();
  buildCatPills();
  buildPessoaPills();
  buildTipoPills();
  buildParceladoPills();
  document.getElementById("parcelasField").style.display="none";
  document.getElementById("valorHintParcela").textContent="";
  document.getElementById("tipoDateRow").style.display="flex";
  document.getElementById("parceladoWrap").style.display="block";
  document.getElementById("addSheetTitle").textContent="Novo gasto";
  document.getElementById("saveBtn").textContent="Salvar gasto";
  updateTipoHint();
  document.getElementById("addOverlay").classList.remove("hidden");
  lockBody();
  setupValorInput();
  setTimeout(()=>document.getElementById("fValor").focus(),50);
}

function closeAdd(){
  document.getElementById("addOverlay").classList.add("hidden");
  state.editing=null;
  unlockBody();
}

function openEditItem(g){
  state.editing={type:g.__virtual?"fixo":"gasto",id:g.__virtual?g.fixoId:g.id};
  setValorDisplay(g.valor);
  document.getElementById("fObs").value=g.observacao||"";
  document.getElementById("fData").value=g.data;
  state.catSel=g.categoria;
  state.pessoaSel=g.pessoa;
  state.tipoSel=g.tipo;
  state.parceladoSel=false;

  buildDescOptions(g.descricao);
  buildCatPills();
  buildPessoaPills();
  buildTipoPills();
  buildParceladoPills();
  document.getElementById("parcelasField").style.display="none";
  document.getElementById("valorHintParcela").textContent="";
  document.getElementById("parceladoWrap").style.display="none";

  if(g.__virtual){
    document.getElementById("tipoDateRow").style.display="none";
    document.getElementById("tipoHint").textContent="Esse é um gasto fixo recorrente — a alteração vale para todos os meses em que ele aparece. Para remover só a partir de um mês específico, use o ícone de lixeira no card.";
  } else {
    document.getElementById("tipoDateRow").style.display="flex";
    document.getElementById("tipoHint").textContent="";
  }

  document.getElementById("addSheetTitle").textContent="Editar gasto";
  document.getElementById("saveBtn").textContent="Salvar alterações";
  document.getElementById("addOverlay").classList.remove("hidden");
  lockBody();
  setupValorInput();
}

function buildDescOptions(selectedValue){
  const el=document.getElementById("fDesc");
  let opts=DESC_OPTIONS.slice();
  if(selectedValue && !opts.includes(selectedValue)) opts.push(selectedValue);
  el.innerHTML=`<option value="" disabled ${selectedValue?"":"selected"}>Selecione...</option>`+
    opts.map(o=>`<option value="${o}" ${o===selectedValue?"selected":""}>${o}</option>`).join("");
}

function buildCatPills(){
  const el=document.getElementById("catPills"); el.innerHTML="";
  CATS.forEach(cat=>{
    const p=document.createElement("div");
    p.className="pill"+(state.catSel===cat.nome?" active":"");
    p.style.background=state.catSel===cat.nome?cat.cor:"";
    p.innerHTML=cat.icon+`<span>${cat.nome}</span>`;
    p.onclick=()=>{ state.catSel=cat.nome; buildCatPills(); };
    el.appendChild(p);
  });
}

function buildPessoaPills(){
  const el=document.getElementById("pessoaPills"); el.innerHTML="";
  [state.perfil.nome_pessoa1,state.perfil.nome_pessoa2,"Ambos"].forEach(nome=>{
    const p=document.createElement("div");
    p.className="pill"+(state.pessoaSel===nome?" active":"");
    p.style.background=state.pessoaSel===nome?"var(--accent)":"";
    p.textContent=nome;
    p.onclick=()=>{ state.pessoaSel=nome; buildPessoaPills(); };
    el.appendChild(p);
  });
}

function buildTipoPills(){
  const el=document.getElementById("tipoPills"); el.innerHTML="";
  ["Variável","Fixo"].forEach(t=>{
    const p=document.createElement("div");
    p.className="pill"+(state.tipoSel===t?" active":"");
    p.style.background=state.tipoSel===t?"var(--cat-2)":"";
    p.textContent=t;
    p.onclick=()=>{
      // Allow type change in edit mode too (item 6)
      state.tipoSel=t; buildTipoPills(); updateTipoHint();
    };
    el.appendChild(p);
  });
}

function buildParceladoPills(){
  const el=document.getElementById("parceladoPills"); el.innerHTML="";
  [{v:false,l:"Não"},{v:true,l:"Sim"}].forEach(opt=>{
    const p=document.createElement("div");
    p.className="pill"+(state.parceladoSel===opt.v?" active":"");
    p.style.background=state.parceladoSel===opt.v?"var(--accent)":"";
    p.textContent=opt.l;
    p.onclick=()=>{
      state.parceladoSel=opt.v;
      buildParceladoPills();
      document.getElementById("parcelasField").style.display=opt.v?"block":"none";
      document.getElementById("valorHintParcela").textContent=opt.v?"(valor de cada parcela)":"";
      updateTipoHint();
    };
    el.appendChild(p);
  });
}

function updateTipoHint(){
  const el=document.getElementById("tipoHint");
  if(state.editing && state.editing.type==="fixo") return;
  el.textContent=(state.tipoSel==="Fixo" && !state.parceladoSel)
    ?"Esse gasto se repete todo mês a partir desta data, até você removê-lo.":"";
}

/* ============================================================
   SALVAR GASTO
   ============================================================ */
async function saveGasto(){
  const valor=getValorAsFloat();
  const descricao=document.getElementById("fDesc").value;
  const observacao=document.getElementById("fObs").value.trim()||null;
  const data=document.getElementById("fData").value;

  if(!valor||valor<=0){ toast("Informe um valor válido"); return; }
  if(!descricao){ toast("Selecione uma descrição"); return; }
  if(!state.pessoaSel){ toast("Selecione quem gastou"); return; }

  const btn=document.getElementById("saveBtn");
  btn.disabled=true; btn.textContent="Salvando...";

  /* modo edição */
  if(state.editing){
    let res;
    if(state.editing.type==="fixo"){
      res=await sb(`fixos?id=eq.${state.editing.id}`,{
        method:"PATCH",
        body:JSON.stringify({descricao,observacao,categoria:state.catSel,pessoa:state.pessoaSel,valor})
      });
    } else {
      res=await sb(`gastos?id=eq.${state.editing.id}`,{
        method:"PATCH",
        body:JSON.stringify({descricao,observacao,categoria:state.catSel,tipo:state.tipoSel,pessoa:state.pessoaSel,valor,data})
      });
    }
    btn.disabled=false; btn.textContent="Salvar alterações";
    if(res.ok){
      closeAdd();
      toast("Gasto atualizado");
      if(state.editing.type==="fixo"){ await loadFixos(); }
      loadGastos();
    } else { toast("Não foi possível salvar as alterações"); }
    return;
  }

  /* criação: fixo */
  if(state.tipoSel==="Fixo" && !state.parceladoSel){
    const dia=parseInt(data.split("-")[2],10);
    const res=await sb("fixos",{
      method:"POST",
      body:JSON.stringify([{descricao,observacao,categoria:state.catSel,pessoa:state.pessoaSel,valor,dia,data_inicio:data}])
    });
    btn.disabled=false; btn.textContent="Salvar gasto";
    if(res.ok){ closeAdd(); toast("Gasto fixo criado — vai se repetir todo mês"); await loadFixos(); loadGastos(); }
    else { toast("Erro ao salvar. Veja se a tabela 'fixos' existe no Supabase."); }
    return;
  }

  /* criação: avulso ou parcelado */
  let rows;
  if(state.parceladoSel){
    const numParcelas=Math.max(2,parseInt(document.getElementById("fParcelas").value)||2);
    const grupoId=(crypto.randomUUID?crypto.randomUUID():(Date.now()+"-"+Math.random()));
    rows=Array.from({length:numParcelas},(_,i)=>({
      descricao,valor,categoria:state.catSel,tipo:state.tipoSel,
      pessoa:state.pessoaSel,data:addMonths(data,i),observacao,
      parcela_grupo_id:grupoId,parcela_atual:i+1,parcela_total:numParcelas
    }));
  } else {
    rows=[{descricao,valor,categoria:state.catSel,tipo:state.tipoSel,pessoa:state.pessoaSel,data,observacao}];
  }

  const res=await sb("gastos",{method:"POST",body:JSON.stringify(rows)});
  btn.disabled=false; btn.textContent="Salvar gasto";

  if(res.ok){
    closeAdd();
    toast(rows.length>1?`Gasto adicionado em ${rows.length} parcelas`:"Gasto adicionado");
    const {start,end}=monthRange(state.monthDate);
    if(data>=start && data<=end){ loadGastos(); }
  } else { toast("Erro ao salvar. Veja se a tabela 'gastos' tem as colunas novas no Supabase."); }
}

/* ============================================================
   CONFIGURAÇÕES
   ============================================================ */
function openSettings(){
  document.getElementById("fNome1").value=state.perfil.nome_pessoa1;
  document.getElementById("fNome2").value=state.perfil.nome_pessoa2;
  document.getElementById("fRenda1").value=String(state.perfil.renda_pessoa1).replace(".",",");
  document.getElementById("fRenda2").value=String(state.perfil.renda_pessoa2).replace(".",",");
  const meta=Number(state.perfil.meta_economia||0);
  document.getElementById("fMeta").value=meta>0?String(meta).replace(".",","):"";
  document.getElementById("settingsOverlay").classList.remove("hidden");
  lockBody();
}
function closeSettings(){
  document.getElementById("settingsOverlay").classList.add("hidden");
  unlockBody();
}
async function savePerfil(){
  const nome_pessoa1=document.getElementById("fNome1").value.trim()||"Pessoa 1";
  const nome_pessoa2=document.getElementById("fNome2").value.trim()||"Pessoa 2";
  const renda_pessoa1=parseFloat(document.getElementById("fRenda1").value.replace(/\./g,"").replace(",","."))||0;
  const renda_pessoa2=parseFloat(document.getElementById("fRenda2").value.replace(/\./g,"").replace(",","."))||0;
  const meta_economia=parseFloat(document.getElementById("fMeta").value.replace(/\./g,"").replace(",","."))||0;
  const res=await sb("perfil?id=eq.1",{method:"PATCH",body:JSON.stringify({nome_pessoa1,nome_pessoa2,renda_pessoa1,renda_pessoa2,meta_economia})});
  if(res.ok){
    state.perfil={...state.perfil,nome_pessoa1,nome_pessoa2,renda_pessoa1,renda_pessoa2,meta_economia};
    closeSettings(); renderAll(); toast("Configurações salvas");
  } else { toast("Erro ao salvar. Veja se a tabela 'perfil' existe no Supabase."); }
}

/* ============================================================
   INIT
   ============================================================ */
async function initApp(){
  renderMonthLabel();
  await loadPerfil();
  await loadFixos();
  await loadGastos();
}
</script>
